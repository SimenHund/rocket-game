<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ASTRONOMICS</title>
<style>
:root{
  --amb:#ffb454; --ink:#e9dcc2; --dim:#8a8172;
  --line:rgba(255,180,110,.38); --lineDim:rgba(255,180,110,.16);
  --pan:rgba(8,10,14,.94); --bad:#ff7a6b; --ok:#9adf9a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
/* scrollbars in the terminal's own palette */
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-track{background:rgba(255,180,110,.05);border-left:1px solid var(--lineDim);}
::-webkit-scrollbar-thumb{background:rgba(255,180,110,.28);border:2px solid #0b0c12;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,180,84,.55);}
::-webkit-scrollbar-corner{background:transparent;}
@supports (-moz-appearance:none){
  *{scrollbar-width:thin;scrollbar-color:rgba(255,180,110,.35) rgba(10,11,17,.9);}
}
html,body{margin:0;padding:0;overflow:hidden;background:#05060a;height:100%;}
body{font-family:ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,'Courier New',monospace;
  color:var(--ink); user-select:none; -webkit-user-select:none; touch-action:none;}
canvas{display:block;}
#world{position:fixed;inset:0;width:100vw;height:100vh;}
/* CRT-ish scanlines + vignette */
#fx{position:fixed;inset:0;pointer-events:none;z-index:40;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.13) 0 1px, transparent 1px 3px);}
#vg{position:fixed;inset:0;pointer-events:none;z-index:41;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.5) 100%);}
#heatFx{position:fixed;inset:0;pointer-events:none;z-index:42;opacity:0;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(255,60,20,.55) 100%);}
#warpFx{position:fixed;inset:0;pointer-events:none;z-index:43;opacity:0;background:#dfe8ff;}

/* ---------- TITLE ---------- */
#title{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;}
#title h1{margin:0;font-weight:400;font-size:clamp(34px,9vw,86px);letter-spacing:.32em;
  padding-left:.32em;color:var(--ink);text-shadow:0 0 22px rgba(255,180,84,.45),0 0 3px rgba(255,180,84,.8);}
#title .sub{font-size:11px;letter-spacing:.42em;color:var(--dim);margin-bottom:26px;text-align:center;padding:0 12px;}
.mbtn{width:min(280px,80vw);padding:13px 0;background:rgba(10,12,16,.6);border:1px solid var(--line);
  color:var(--ink);font-family:inherit;font-size:13px;letter-spacing:.3em;padding-left:.3em;cursor:pointer;}
.mbtn:hover:not(:disabled){background:rgba(255,180,84,.14);border-color:var(--amb);color:var(--amb);}
.mbtn:disabled{opacity:.35;cursor:default;}
#seedRow{display:flex;gap:8px;align-items:center;margin-top:4px;}
#seedRow label{font-size:10px;letter-spacing:.25em;color:var(--dim);}
#seedIn,.tin{background:transparent;border:1px solid var(--lineDim);color:var(--ink);
  font-family:inherit;font-size:12px;padding:6px 8px;letter-spacing:.15em;outline:none;}
#seedIn{width:130px;text-align:center;}
#seedIn:focus,.tin:focus{border-color:var(--line);}
.tin{width:100%;box-sizing:border-box;letter-spacing:.08em;}
textarea.tin{height:84px;resize:vertical;font-size:10px;letter-spacing:0;word-break:break-all;}
/* strip native number-input spinners everywhere */
input[type=number]{-moz-appearance:textfield;appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
#titleFoot{position:absolute;bottom:14px;font-size:10px;letter-spacing:.25em;color:var(--dim);}

/* ---------- HUD ---------- */
#hud{position:fixed;inset:0;z-index:50;pointer-events:none;}
#hud .clickable{pointer-events:auto;}
#topLeft{position:absolute;top:10px;left:max(12px, env(safe-area-inset-left));display:flex;flex-direction:column;gap:6px;}
.bRow{display:flex;align-items:center;gap:8px;}
.bar{width:290px;height:11px;border:1px solid var(--line);position:relative;background:rgba(0,0,0,.45);}
.bar .fill{position:absolute;top:1px;left:1px;bottom:1px;background:var(--amb);transition:width .15s linear;}
#hullF{background:#9adf9a;}
#cargoF{background:#c9a6ef;}
.bt{font-size:9px;letter-spacing:.2em;color:var(--dim);white-space:nowrap;}
.chipsRow{display:flex;align-items:center;gap:10px;margin-top:2px;}
#chips{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:290px;}
#cargoTxt{font-size:9px;letter-spacing:.2em;color:var(--dim);white-space:nowrap;}
.chip{border:1px solid var(--lineDim);background:rgba(0,0,0,.5);padding:2px 7px;font-size:11px;letter-spacing:.06em;
  display:flex;justify-content:center;gap:6px;white-space:nowrap;}
.chip b{font-weight:400;}
#objective{font-size:10px;letter-spacing:.18em;color:var(--amb);max-width:300px;line-height:1.7;opacity:.9;margin-top:2px;}
#objective span{color:var(--dim);}
#mmWrap{position:absolute;top:10px;right:max(12px, env(safe-area-inset-right));width:150px;
  display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.mmBtn{width:100%;min-width:0;overflow:hidden;background:var(--pan);border:1px solid var(--line);
  padding:6px 6px 7px;cursor:pointer;
  display:flex;flex-direction:column;gap:6px;align-items:center;font-family:inherit;}
.mmBtn:hover{border-color:var(--amb);}
.mmBtn:hover #mmLab{color:var(--amb);}
#mm{min-width:0;display:block;background:rgba(3,4,8,.8);}
#mmLab{font-size:11px;letter-spacing:.18em;color:var(--ink);line-height:1;padding:2px 0 1px;}
.kbd{color:var(--dim);}
@media (pointer:coarse){ .kbd{display:none;} #btnFull{display:none;} }
#btnBar{display:flex;flex-direction:column;gap:6px;width:100%;margin-top:2px;}
.hbtn{width:100%;padding:8px 10px;background:var(--pan);border:1px solid var(--line);color:var(--ink);
  font-family:inherit;font-size:11px;letter-spacing:.18em;cursor:pointer;text-align:center;}
.hbtn:hover{border-color:var(--amb);color:var(--amb);}
#prompt{position:absolute;bottom:96px;left:50%;transform:translateX(-50%);font-size:13px;
  letter-spacing:.18em;color:var(--amb);text-shadow:0 0 10px rgba(255,180,84,.5);white-space:nowrap;}
#toasts{position:absolute;left:12px;bottom:14px;display:flex;flex-direction:column;gap:5px;max-width:74vw;}
.toast{border-left:2px solid var(--amb);background:var(--pan);padding:6px 10px;font-size:11px;
  letter-spacing:.08em;animation:tIn .25s ease-out;}
.toast.good{border-left-color:var(--ok);}
.toast.bad{border-left-color:var(--bad);}
@keyframes tIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:none;}}
.fadeOut{opacity:0;transition:opacity .8s;}

/* touch controls */
#stick{position:absolute;left:22px;bottom:90px;width:124px;height:124px;border:1px solid var(--lineDim);
  border-radius:50%;display:none;}
#knob{position:absolute;left:50%;top:50%;width:46px;height:46px;margin:-23px 0 0 -23px;border-radius:50%;
  border:1px solid var(--line);background:rgba(255,180,84,.12);}
#abtns{position:absolute;right:16px;bottom:90px;display:none;flex-direction:column;gap:10px;}
.abtn{width:104px;height:58px;background:var(--pan);border:1px solid var(--line);color:var(--ink);
  font-family:inherit;font-size:11px;letter-spacing:.2em;}
.abtn:active{background:rgba(255,180,84,.2);}
@media (pointer:coarse){ #stick,#abtns{display:flex;} #stick{display:block;} }

/* desktop: larger HUD all around (~1.2x, everything scaled equally), objective centered up top */
@media (pointer:fine) and (min-width:1000px){
  .bRow{gap:10px;}
  .bar{width:346px;height:13px;}
  .bt{font-size:11px;}
  #chips{width:346px;grid-gap:6px;}
  .chip{font-size:13px;padding:3px 8px;}
  #cargoTxt{font-size:11px;}
  #btnEject{font-size:13px !important;padding:10px 12px !important;}
  #objective{position:fixed;top:14px;left:50%;transform:translateX(-50%);
    text-align:center;max-width:46vw;font-size:12px;margin-top:0;}
  #mmWrap{width:178px;}
  .mmBtn{padding:7px 7px 8px;gap:7px;}
  #mmLab{font-size:13px;}
  .hbtn{font-size:13px;padding:10px 12px;}
  #btnBar{gap:7px;}
  .toast{font-size:13px;padding:7px 12px;}
}

/* narrow screens (phones, portrait) — shrink both columns so they never meet */
@media (max-width:768px){
  #mmWrap{width:112px;}
  .bar{width:198px;}
  #chips{width:198px;}
  .chip{font-size:10px;padding:2px 5px;}
  #objective{max-width:190px;font-size:9px;}
  .hbtn{padding:7px 6px;font-size:10px;letter-spacing:.1em;}
  #mmLab{font-size:10px;letter-spacing:.1em;}
}
/* short screens (phones, landscape) — compact right column, action buttons go side by side */
@media (max-height:520px){
  #mmWrap{width:104px;}
  .hbtn{padding:5px 6px;font-size:9px;letter-spacing:.1em;}
  #mmLab{font-size:9px;letter-spacing:.1em;}
  #abtns{flex-direction:row-reverse;bottom:max(14px, env(safe-area-inset-bottom));right:max(14px, env(safe-area-inset-right));gap:8px;}
  .abtn{width:86px;height:46px;font-size:10px;}
  #stick{bottom:max(14px, env(safe-area-inset-bottom));width:104px;height:104px;}
  #prompt{bottom:70px;font-size:11px;}
  #toasts{max-width:50vw;}
}

/* ---------- PANEL (modal) ---------- */
#panelWrap{position:fixed;inset:0;z-index:70;background:rgba(2,3,6,.6);display:flex;
  align-items:center;justify-content:center;padding:12px;}
#panel{width:min(580px,96vw);max-height:86vh;overflow-y:auto;background:var(--pan);
  border:1px solid var(--line);padding:16px 18px;box-shadow:0 0 40px rgba(0,0,0,.8);}
.pHead{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--lineDim);
  padding-bottom:8px;margin-bottom:10px;}
.pTitle{font-size:16px;letter-spacing:.22em;color:var(--amb);}
.pClose{background:none;border:1px solid var(--line);color:var(--ink);font-family:inherit;
  font-size:11px;padding:4px 10px;cursor:pointer;letter-spacing:.15em;}
.pClose:hover{color:var(--amb);border-color:var(--amb);}
.sub{font-size:11px;color:var(--dim);letter-spacing:.1em;line-height:1.55;}
.secH{font-size:10px;letter-spacing:.3em;color:var(--dim);margin:14px 0 6px;border-bottom:1px solid var(--lineDim);padding-bottom:3px;}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 0;
  border-bottom:1px dashed var(--lineDim);font-size:12px;flex-wrap:wrap;}
.row .lft{flex:1;min-width:140px;}
.row .btns{display:flex;gap:6px;flex-wrap:wrap;}
.row .mid{flex:1;display:flex;justify-content:center;}
.row .mid .midIn{display:flex;flex-direction:column;gap:2px;font-size:10px;letter-spacing:.05em;
  color:var(--ink);text-align:left;white-space:nowrap;}
.row .btns.vstack{flex-direction:column;align-items:stretch;gap:4px;flex:0 0 128px;width:128px;}
.row .btns.vstack .act{width:100%;}
.row .btns.vstack .cost{text-align:center;}
/* galaxy-map side list: info | rates | stacked buttons, evenly distributed */
#mapSide .row{flex-wrap:nowrap;}
#mapSide .row .lft{flex:1.1;min-width:96px;}
#mapSide .row .btns{flex-direction:column;align-items:stretch;flex:0 0 128px;gap:5px;}
#mapSide .row .btns .act{width:100%;}
#mapSide .row .btns .cost{text-align:center;}
.act.tbtn{width:96px;padding-left:0;padding-right:0;text-align:center;}
.act.amt{width:52px;padding-left:0;padding-right:0;text-align:center;}
.act{background:rgba(255,180,84,.08);border:1px solid var(--line);color:var(--ink);
  font-family:inherit;font-size:11px;padding:6px 11px;cursor:pointer;letter-spacing:.08em;}
.act:hover:not(:disabled){background:rgba(255,180,84,.2);color:var(--amb);border-color:var(--amb);}
.act:disabled{opacity:.35;cursor:default;}
.cost{font-size:10px;color:var(--dim);letter-spacing:.05em;}
.tag{display:inline-block;border:1px solid var(--lineDim);padding:1px 6px;font-size:10px;
  letter-spacing:.15em;color:var(--dim);margin-left:6px;vertical-align:middle;}
.hueDot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:-1px;}
.stars{letter-spacing:2px;color:var(--amb);}
.card{border:1px solid var(--lineDim);padding:9px 11px;margin-bottom:8px;}
.card.owned{border-color:rgba(154,223,154,.4);}
.card .cn{font-size:12px;letter-spacing:.15em;}
.card .cd{font-size:10px;color:var(--dim);margin:4px 0 6px;line-height:1.5;}
.good{color:var(--ok);} .badc{color:var(--bad);} .amb{color:var(--amb);}

/* ---------- GALAXY MAP ---------- */
#mapWrap{position:fixed;inset:0;z-index:65;background:#04050a;}
#mapC{position:absolute;inset:0;width:100%;height:100%;}
#mapTop{position:absolute;top:10px;left:12px;display:flex;gap:6px;flex-wrap:wrap;z-index:2;}
#mapHint{position:absolute;top:52px;left:12px;font-size:10px;letter-spacing:.2em;color:var(--amb);z-index:2;}
#mapSide .row{flex-wrap:nowrap;}
#mapSide .row .lft{flex:1 1 0;min-width:0;}
#mapSide .row .mid{flex:0 0 98px;justify-content:flex-start;}
#mapSide .row .mid .midIn{font-size:9px;}
#mapSide{position:absolute;top:10px;right:12px;width:280px;max-height:76vh;overflow-y:auto;
  background:var(--pan);border:1px solid var(--line);padding:12px 14px;z-index:2;}
#mapSide:empty{display:none;}
@media (max-width:640px){
  #mm{width:112px;height:112px;} #btnBar{top:150px;}
  #mapSide{top:auto;bottom:10px;left:12px;right:12px;width:auto;max-height:44vh;}
  #objective{max-width:44vw;font-size:9px;}
  .bar{width:198px;}
}
/* desktop galaxy-map system list — placed last so it wins over the base rules above */
@media (pointer:fine) and (min-width:1000px){
  #mapSide{width:490px;max-height:80vh;padding:14px 16px;}
  #mapSide .pTitle{font-size:16px !important;}
  #mapSide .sub{font-size:11px;}
  #mapSide .row{font-size:13px;}
  #mapSide .row .cost{font-size:11px;}
  #mapSide .row .mid .midIn{font-size:11px;}
  #mapSide .mid .stars{font-size:11px !important;}
  #mapSide .row .mid{flex:0 0 124px;}
  #mapSide .row .btns.vstack{flex:0 0 148px;width:148px;}
  #mapSide .act{font-size:12px;}
}
</style>
</head>
<body>
<canvas id="world"></canvas>
<div id="fx"></div><div id="vg"></div><div id="heatFx"></div><div id="warpFx"></div>

<!-- TITLE SCREEN -->
<div id="title">
  <h1>ASTRONOMICS</h1>
  <div class="sub">DEEP&nbsp;SPACE&nbsp;RESOURCE&nbsp;&amp;&nbsp;TRADE&nbsp;COMMAND</div>
  <button class="mbtn" id="btnNew">NEW EXPEDITION</button>
  <button class="mbtn" id="btnCont" disabled>CONTINUE</button>
  <button class="mbtn" id="btnSaves">SAVES</button>
  <button class="mbtn" id="btnHow">MANUAL</button>
  <button class="mbtn" id="btnFull">FULLSCREEN: OFF</button>
  <button class="mbtn" id="btnSnd">SOUND: ON</button>
  <div id="seedRow"><label>SEED</label><input id="seedIn" maxlength="10" placeholder="RANDOM"></div>
  <div id="titleFoot">ASTRONOMICS v1.0 — A PROCEDURAL GALAXY AWAITS</div>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div id="topLeft">
    <div class="bRow"><div class="bar"><div class="fill" id="fuelF"></div></div><span class="bt">FUEL</span></div>
    <div class="bRow"><div class="bar"><div class="fill" id="hullF"></div></div><span class="bt">HULL</span></div>
    <div class="bRow"><div class="bar"><div class="fill" id="cargoF"></div></div><span class="bt">HOLD</span></div>
    <div class="chipsRow"><div id="chips"></div><div id="cargoTxt"></div></div>
    <button class="hbtn clickable" id="btnEject" style="width:auto;align-self:flex-start;padding:5px 10px;font-size:10px;">JETTISON <span class="kbd">[Q]</span></button>
    <div id="objective"></div>
  </div>
  <div id="mmWrap" class="clickable">
    <button class="mmBtn" id="btnMap">
      <canvas id="mm" width="150" height="150"></canvas>
      <span id="mmLab">GALAXY MAP <span class="kbd">[M]</span></span>
    </button>
    <div id="btnBar">
      <button class="hbtn" id="btnRes">RESEARCH <span class="kbd">[R]</span></button>
      <button class="hbtn" id="btnMenu">MENU <span class="kbd">[TAB]</span></button>
    </div>
  </div>
  <div id="prompt"></div>
  <div id="toasts"></div>
  <div id="stick" class="clickable"><div id="knob"></div></div>
  <div id="abtns" class="clickable">
    <button class="abtn" id="abBoost">BOOST</button>
    <button class="abtn" id="abInteract">DOCK</button>
  </div>
</div>

<!-- MODAL PANEL -->
<div id="panelWrap" style="display:none"><div id="panel"></div></div>

<!-- GALAXY MAP -->
<div id="mapWrap" style="display:none">
  <canvas id="mapC"></canvas>
  <div id="mapTop">
    <button class="hbtn" id="btnMapClose">CLOSE [M]</button>
    <button class="hbtn" id="btnZoomIn">ZOOM +</button>
    <button class="hbtn" id="btnZoomOut">ZOOM −</button>
    <button class="hbtn" id="btnRoutes">ROUTES</button>
  </div>
  <div id="mapHint"></div>
  <div id="mapSide"></div>
</div>

<script>
"use strict";
/* =====================================================================
   ASTRONOMICS — single-file space exploration / economy game
   Sections:
     1. Utilities & seeded RNG          5. Input (keys + touch)
     2. Persistent storage adapter      6. Simulation (ship, colonies,
     3. Sound (tiny WebAudio synth)        freighters, milestones)
     4. Data tables + galaxy generator  7. Rendering (world, minimap)
                                        8. Galaxy map overlay
                                        9. UI panels, HUD, main loop
   ===================================================================== */

/* ---------------- 1. UTILITIES ---------------- */
const TAU = Math.PI*2;
const $ = id => document.getElementById(id);
const clamp = (v,a,b) => v<a?a:(v>b?b:v);
const lerp = (a,b,t) => a+(b-a)*t;
const hyp = (x,y) => Math.sqrt(x*x+y*y);
const hsl = (h,s,l,a=1) => `hsla(${h},${s}%,${l}%,${a})`;
function fmt(n){
  n = Math.floor(n);
  if(n>=100000) return (n/1000).toFixed(0)+'k';
  if(n>=10000)  return (n/1000).toFixed(1)+'k';
  return n.toLocaleString('en-US');
}
// deterministic PRNG
function mulberry32(s){
  return function(){
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s>>>15, 1 | s);
    t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
// spatial hash -> [0,1), for infinite starfields
function hash3(x,y,z){
  let h = (x*374761393 + y*668265263 + z*1442695041) | 0;
  h = Math.imul(h ^ h>>>13, 1274126177);
  return ((h ^ h>>>16) >>> 0) / 4294967296;
}
function seedFromString(str){
  let h = 2166136261;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}

/* ---------------- 2. STORAGE ADAPTER ----------------
   Works in claude.ai artifacts (window.storage), as a standalone
   file (localStorage), or falls back to memory-only. */
const MEMSTORE = {};
async function stSet(k,v){
  const s = JSON.stringify(v);
  try{ if(window.storage){ await window.storage.set(k,s); return true; } }catch(e){}
  try{ localStorage.setItem(k,s); return true; }catch(e){}
  MEMSTORE[k]=s; return true;
}
async function stGet(k){
  try{ if(window.storage){ const r = await window.storage.get(k); if(r&&r.value!=null) return JSON.parse(r.value); } }catch(e){}
  try{ const v = localStorage.getItem(k); if(v!=null) return JSON.parse(v); }catch(e){}
  if(MEMSTORE[k]!=null) return JSON.parse(MEMSTORE[k]);
  return null;
}

/* ---------------- 3. SOUND ---------------- */
const SND = {
  on:true, ctx:null, amb:null,
  ensure(){
    if(!this.ctx){
      try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ this.on=false; }
    }
    if(this.ctx && this.ctx.state==='suspended') this.ctx.resume();
  },
  tone(f, dur, type='square', vol=.05, slide=0){
    if(!this.on || !this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(f, t);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20,f+slide), t+dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(.0001, t+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t+dur+.02);
  },
  blip(){ this.tone(660,.07,'square',.04); },
  ping(){ this.tone(880,.25,'sine',.05,240); },
  coin(){ this.tone(520,.06,'square',.05); setTimeout(()=>this.tone(780,.1,'square',.05),60); },
  thunk(){ this.tone(140,.15,'triangle',.09,-40); },
  err(){ this.tone(180,.18,'sawtooth',.05,-60); },
  warp(){ this.tone(160,.7,'sawtooth',.06,900); this.tone(80,.7,'sine',.06,500); },
  scanp(){ this.tone(1100,.12,'sine',.035,300); },
  ambient(){
    if(!this.on || !this.ctx || this.amb) return;
    const c = this.ctx;
    const g = c.createGain(); g.gain.value = .022; g.connect(c.destination);
    const fl = c.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=340; fl.connect(g);
    const o1 = c.createOscillator(), o2 = c.createOscillator();
    o1.type='sawtooth'; o2.type='sawtooth'; o2.detune.value = 8;
    o1.connect(fl); o2.connect(fl); o1.start(); o2.start();
    const roots = [55, 65.4, 49, 43.65, 58.27];
    let i = 0;
    const step = ()=>{ if(!this.on) return;
      const f = roots[i++ % roots.length];
      o1.frequency.linearRampToValueAtTime(f, c.currentTime+6);
      o2.frequency.linearRampToValueAtTime(f*1.5, c.currentTime+6);
    };
    step(); this.amb = {g, timer:setInterval(step, 13000)};
  },
  toggle(){
    this.on = !this.on;
    if(!this.on && this.amb){ this.amb.g.gain.value = 0; }
    if(this.on){ this.ensure(); if(this.amb) this.amb.g.gain.value = .022; else this.ambient(); }
    stSet('astronomics_snd', this.on);
  }
};

const SYS_A = ['VOR','KAE','NEB','AUR','THAL','ORI','BEL','CYN','DRA','ERE','FEN','HYD',
  'ISH','JUN','KEL','LOR','MAR','NYX','OPH','PRAX','QUO','RHE','SEL','TAU','ULM','VEX','WYR','XAN','YRI','ZEPH'];
const SYS_B = ['ATH','ION','ARA','EUS','IX','ORA','UNE','IS','ANTHA','OS','EA','IR','UL','EMIS','YRA','ON','AK'];
const SYS_C = ['','',' REACH',' DRIFT',' VERGE','',' EXPANSE','',' MINOR',''];
const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX'];
const GREEK = ['ALPHA','BETA','GAMMA','DELTA','EPSILON','ZETA','ETA','THETA','IOTA','KAPPA','SIGMA','TAU','OMEGA'];

/* ---------------- GALAXY GENERATOR ---------------- */
const WORLD_R = 26000;
let GAL = null;        // active galaxy
let PIDX = new Map();  // planetId -> {sys, p}
let SIDX = new Map();  // stationId -> {sys}

function genGalaxy(seed){
  const R = mulberry32(seed);
  const rr = (a,b)=> a + R()*(b-a);
  const ri = (a,b)=> Math.floor(rr(a,b+1));
  const pick = arr => arr[Math.floor(R()*arr.length)];
  const wpick = arr => { // [[val,weight]...]
    let tot = 0; for(const e of arr) tot += e[1];
    let x = R()*tot;
    for(const e of arr){ x -= e[1]; if(x<=0) return e[0]; }
    return arr[0][0];
  };
  const usedNames = new Set();
  function sysName(){
    for(let i=0;i<40;i++){
      const n = pick(SYS_A)+pick(SYS_B).toLowerCase()+pick(SYS_C);
      const nn = n.charAt(0)+n.slice(1).toLowerCase();
      if(!usedNames.has(nn)){ usedNames.add(nn); return nn.toUpperCase(); }
    }
    return 'SYSTEM '+ri(100,999);
  }
  function pickSun(){
    return wpick(SUNHUES.map(s=>[s, s.w]));
  }
  function makePlanet(si, pi, orbit, zone, forced){
    let type;
    if(forced) type = forced;
    else if(zone==='inner') type = wpick([['lava',3],['rocky',4],['desert',3]]);
    else if(zone==='mid')   type = wpick([['rocky',3],['terran',3],['ocean',2],['desert',2]]);
    else                    type = wpick([['ice',4],['gas',4],['rocky',2]]);
    const T = PTYPES[type];
    const size = type==='gas' ? rr(80,130) : rr(28,105);
    const hue = type==='gas' ? pick(GASHUES)+rr(-10,10) : T.hue + rr(-T.hj, T.hj);
    const rich = forced==='rocky' ? rr(1.1,1.5) : rr(0.6,1.8);
    const cRich = forced==='rocky' ? true : R() < 0.22;
    const p = {
      i:pi, id:'p'+si+'_'+pi, type, size, hue, sat:T.sat,
      orbit, a0:rr(0,TAU), osp:(0.9/Math.sqrt(orbit))* (R()<.5?1:-1) * rr(.6,1.2),
      rotSpd: rr(0.015,0.05)*(R()<.5?1:-1),
      rich, cRich, rates: planetRates(type, rich, cRich),
      f:{}, // visual features
    };
    // precompute visual features (stable, cheap to draw)
    const fr = mulberry32(Math.floor(R()*1e9));
    const frr = (a,b)=> a+fr()*(b-a);
    if(T.feat==='craters' || T.feat==='desert'){
      p.f.craters = [];
      const n = Math.floor(size/14)+2;
      for(let k=0;k<n;k++) p.f.craters.push({a:frr(0,TAU), d:frr(.15,.8), r:frr(.07,.18)});
      if(T.feat==='desert'){ p.f.dunes = []; for(let k=0;k<4;k++) p.f.dunes.push({y:frr(-.7,.7), t:fr()<.5?1:3}); }
    }
    if(T.feat==='bands'){
      p.f.bands = [];
      let y = -.9;
      while(y < .85){ const h = frr(.1,.26); p.f.bands.push({y, h, t: fr()<.5?1:3}); y += h + frr(.02,.1); }
      p.f.storm = fr()<.6 ? {a:frr(0,TAU), d:frr(.3,.6), r:frr(.1,.18)} : null;
    }
    if(T.feat==='ice'){
      p.f.streaks = []; for(let k=0;k<5;k++) p.f.streaks.push({y:frr(-.5,.5), w:frr(.3,.9)});
    }
    if(T.feat==='lava'){
      p.f.cracks = [];
      const n = ri(5,8);
      for(let k=0;k<n;k++){
        const pts = [], segs = ri(3,5); let a = frr(0,TAU), d = frr(.05,.2);
        for(let s2=0;s2<segs;s2++){ pts.push([a,d]); a += frr(-.7,.7); d += frr(.12,.25); }
        p.f.cracks.push(pts);
      }
    }
    if(T.feat==='terran' || T.feat==='ocean'){
      p.f.blobs = [];
      const n = T.feat==='terran' ? ri(4,7) : ri(2,4);
      for(let k=0;k<n;k++) p.f.blobs.push({a:frr(0,TAU), d:frr(.1,.75), r:frr(.12,.3), r2:frr(.08,.2), a2:frr(0,TAU)});
    }
    return p;
  }
  function makeSystem(i, x, y, isHome){
    const sun = pickSun();
    const s = { i, x, y, name: isHome ? 'SOLHAVEN' : sysName(),
      sun:{ r: isHome?260:rr(170,420), h:sun.h, s:sun.s, cls:sun.name },
      planets:[], station:null, maxR:0 };
    const n = isHome ? 3 : ri(2,7);
    let orbit = s.sun.r + rr(380,560);
    const forcedHome = ['terran','rocky','ice'];
    for(let pi=0; pi<n; pi++){
      const f = (pi)/(Math.max(1,n-1));
      const zone = f<0.34 ? 'inner' : (f<0.67 ? 'mid' : 'outer');
      s.planets.push(makePlanet(i, pi, orbit, zone, isHome?forcedHome[pi]:null));
      orbit += rr(430,780);
    }
    if(isHome || R() < 0.14){
      s.station = { id:'st'+i, orbit: orbit - rr(150,320), a0: rr(0,TAU),
        osp: 0.5/Math.sqrt(orbit), name:'WAYPOINT '+pick(GREEK),
        prices:{} };
      for(const k of RESKEYS) s.station.prices[k] = rr(0.7,1.5);
    }
    s.maxR = orbit + 320;
    return s;
  }
  const systems = [ makeSystem(0, 0, 0, true) ];
  let attempts = 0;
  while(systems.length < 150 && attempts < 4000){
    attempts++;
    const a = R()*TAU, d = Math.sqrt(R())*WORLD_R;
    const x = Math.cos(a)*d, y = Math.sin(a)*d;
    let ok = true;
    for(const s of systems){ if(hyp(s.x-x, s.y-y) < 2500){ ok=false; break; } }
    if(ok) systems.push(makeSystem(systems.length, x, y, false));
  }
  const anomalies = [];
  let ai = 0;
  while(anomalies.length < 72 && ai < 2000){
    ai++;
    const a = R()*TAU, d = Math.sqrt(R())*WORLD_R;
    const x = Math.cos(a)*d, y = Math.sin(a)*d;
    let ok = true;
    for(const s of systems){ if(hyp(s.x-x, s.y-y) < s.maxR*0.5){ ok=false; break; } }
    if(ok) anomalies.push({ id:'a'+anomalies.length, x, y,
      type: wpick([['cache',4],['crystal',3.5],['derelict',2.5]]) });
  }
  const gal = { seed, systems, anomalies };
  // guaranteed starter anomaly near spawn (set after spawn known in newState)
  return gal;
}
function indexGalaxy(){
  PIDX = new Map(); SIDX = new Map();
  for(const s of GAL.systems){
    for(const p of s.planets) PIDX.set(p.id, {sys:s, p});
    if(s.station) SIDX.set(s.station.id, {sys:s});
  }
}
function planetPos(sys, p, t){
  const a = p.a0 + t*p.osp;
  return { x: sys.x + Math.cos(a)*p.orbit, y: sys.y + Math.sin(a)*p.orbit };
}
function stationPos(sys, t){
  const st = sys.station, a = st.a0 + t*st.osp;
  return { x: sys.x + Math.cos(a)*st.orbit, y: sys.y + Math.sin(a)*st.orbit };
}

let G = null;               // full game state
let MODE = 'menu';          // 'menu' | 'play'
const FUELMAX = 100;

function newState(seed){
  GAL = genGalaxy(seed); indexGalaxy();
  const home = GAL.systems[0];
  const stp = stationPos(home, 0);
  const spawn = { x: stp.x + 210, y: stp.y + 120 };
  /* systems overlap in dense regions — never materialize inside ANY star's heat zone */
  for(let iter=0; iter<GAL.systems.length; iter++){
    let hot = null;
    for(const s of GAL.systems){
      const d = hyp(s.x-spawn.x, s.y-spawn.y);
      if(d < s.sun.r + 650){ hot = {s, d}; break; }
    }
    if(!hot) break;
    const ux = hot.d>1 ? (spawn.x-hot.s.x)/hot.d : 1;
    const uy = hot.d>1 ? (spawn.y-hot.s.y)/hot.d : 0;
    spawn.x = hot.s.x + ux*(hot.s.sun.r + 700);
    spawn.y = hot.s.y + uy*(hot.s.sun.r + 700);
  }
  // starter anomaly close to spawn
  GAL.anomalies.unshift({ id:'a_start', x:spawn.x+1200, y:spawn.y-700, type:'crystal' });
  G = {
    seed, time:0, playSec:0,
    x:spawn.x, y:spawn.y, vx:0, vy:0, ang:-Math.PI/2,
    fuel:FUELMAX, hull:100,
    credits:500,
    cargo:{metal:45, ice:0, gas:0, organics:22, crystal:0},
    research:new Set(), visited:new Set([0]), scanned:new Set(),
    anomTaken:new Set(), colonies:{}, routes:[],
    milestones:{}, flags:{},
    navTarget:null,
    warpCd:0,
  };
  return G;
}
function serialize(){
  return {
    seed:G.seed, time:G.time, playSec:G.playSec,
    x:G.x, y:G.y, ang:G.ang, fuel:G.fuel, hull:G.hull,
    credits:G.credits, cargo:G.cargo,
    research:[...G.research], visited:[...G.visited], scanned:[...G.scanned],
    anomTaken:[...G.anomTaken], colonies:G.colonies, routes:G.routes,
    milestones:G.milestones, flags:G.flags, navTarget:G.navTarget||null,
  };
}
async function saveGame(){
  if(!G) return;
  await stSet('astronomics_save', serialize());
}
function applySave(o){
  GAL = genGalaxy(o.seed); indexGalaxy();
  const home = GAL.systems[0];
  const stp = stationPos(home, 0);
  GAL.anomalies.unshift({ id:'a_start', x:stp.x+210+1200, y:stp.y+120-700, type:'crystal' });

  keys[e.code] = true;

  if(MODE!=='play') return;
  if(e.code==='KeyE'||e.code==='Enter'){ if(!modalOpen()) interact(); }
  if(e.code==='KeyM'){ mapVisible() ? closeMap() : (panelVisible()?0:openMap()); }
  if(e.code==='KeyR'){ if(!mapVisible()){ panelVisible() ? closePanel() : showResearch(); } }
  if(e.code==='KeyQ'){ if(!mapVisible()){ panelVisible() ? closePanel() : showEject(); } }
  if(e.code==='Space' && panelVisible() && PANEL_PID && G && G.dockAnchor
     && G.dockAnchor.id===PANEL_PID && G.colonies[PANEL_PID]){
    handExtract(PANEL_PID); /* SPACE works the ground crew while docked */
  }
  if(e.code==='Tab'){
    if(panelVisible()) closePanel();      /* topmost layer first */
    else if(mapVisible()) closeMap();
    else showMenu();
  }
});

function stickCenter(){
  const r = stickEl.getBoundingClientRect();
  return { x:r.left + r.width/2, y:r.top + r.height/2, rad:r.width/2 };
}
stickEl.addEventListener('pointerdown', e=>{
  stick.active = true; stick.id = e.pointerId;
  stickEl.setPointerCapture(e.pointerId); moveStick(e);
});
stickEl.addEventListener('pointermove', e=>{ if(stick.active && e.pointerId===stick.id) moveStick(e); });
function endStick(e){
  if(e.pointerId!==stick.id) return;
  stick.active=false; stick.dx=0; stick.dy=0;
  knobEl.style.transform = 'translate(0,0)';
}
stickEl.addEventListener('pointerup', endStick);
stickEl.addEventListener('pointercancel', endStick);
function moveStick(e){
  const c = stickCenter();
  let dx = e.clientX-c.x, dy = e.clientY-c.y;
  const d = hyp(dx,dy), m = c.rad-20;
  if(d>m){ dx = dx/d*m; dy = dy/d*m; }
  stick.dx = dx/m; stick.dy = dy/m;
  knobEl.style.transform = `translate(${dx}px,${dy}px)`;
}
let boostHeld = false;
$('abBoost').addEventListener('pointerdown', ()=>boostHeld=true);
$('abBoost').addEventListener('pointerup',   ()=>boostHeld=false);
$('abBoost').addEventListener('pointercancel',()=>boostHeld=false);
$('abInteract').addEventListener('click', ()=>{ if(!modalOpen()) interact(); });

function stickVec(){ // touch joystick: point in a direction to fly there
  if(!stick.active) return {x:0, y:0, on:false};
  let x = stick.dx, y = stick.dy;
  const d = hyp(x,y);
  if(d>1){ x/=d; y/=d; }
  return {x, y, on: d>0.15};
}
function keyCtl(){ // keyboard: W thrust · A/D turn · S brake
  return {
    turn: (keys.KeyD||keys.ArrowRight ? 1 : 0) - (keys.KeyA||keys.ArrowLeft ? 1 : 0),
    thrust: !!(keys.KeyW||keys.ArrowUp),
    brake:  !!(keys.KeyS||keys.ArrowDown),
  };
}

/* ---------------- UI helpers used by actions ---------------- */
function toast(msg, cls){
  const box = $('toasts');
  const d = document.createElement('div');
  d.className = 'toast'+(cls?' '+cls:'');
  d.textContent = msg;
  box.appendChild(d);
  while(box.children.length>5) box.removeChild(box.firstChild);
  setTimeout(()=>{ d.classList.add('fadeOut'); setTimeout(()=>d.remove(), 850); }, 3800);
}
function costStr(c){
  const parts = [];
  if(c.metal)    parts.push(c.metal+' ME');
  if(c.organics) parts.push(c.organics+' OR');
  if(c.crystal)  parts.push(c.crystal+' CR');
  if(c.credits)  parts.push('¤'+fmt(c.credits));
  return parts.join(' · ');
}
function canPay(c){
  if(c.credits && G.credits < c.credits) return false;
  for(const k of ['metal','organics','crystal']) if(c[k] && G.cargo[k] < c[k]) return false;
  return true;
}
function pay(c){
  if(!canPay(c)) return false;
  if(c.credits) G.credits -= c.credits;
  for(const k of ['metal','organics','crystal']) if(c[k]) G.cargo[k] -= c[k];
  return true;
}

/* ---------------- INTERACTION TARGETS ---------------- */
let CURSYS = null;   // system the ship is currently inside
function findCurSys(){
  // System zones overlap heavily (stars can be 2500 apart, zones reach ~6000),
  // so "first zone containing the ship" often picks a neighboring system —
  // making its own planets undockable/unscannable. Instead, assign the system
  // whose nearest BODY (star, planet, or station) is closest to the ship.
  CURSYS = null;
  let bestD = Infinity;
  for(const s of GAL.systems){
    const dSun = hyp(s.x-G.x, s.y-G.y);
    if(dSun - s.maxR > 900) continue;      // cheap reject: far outside this system
    let d = dSun;
    for(const p of s.planets){
      const pos = planetPos(s, p, G.time);
      d = Math.min(d, hyp(pos.x-G.x, pos.y-G.y));
    }
    if(s.station){
      const pos = stationPos(s, G.time);
      d = Math.min(d, hyp(pos.x-G.x, pos.y-G.y));
    }
    if(d < bestD){ bestD = d; CURSYS = s; }
  }
}
function computeInteract(){
  // Docking must not depend on which single system the ship is "assigned" to —
  // system zones overlap, so check every nearby system for the closest body.
  let best = null;
  for(const sys of GAL.systems){
    if(hyp(sys.x-G.x, sys.y-G.y) - sys.maxR > 900) continue;
    for(const p of sys.planets){
      const pos = planetPos(sys, p, G.time);
      const d = hyp(pos.x-G.x, pos.y-G.y);
      if(d < p.size + 120 && (!best || d < best.d)){
        const col = G.colonies[p.id];
        best = { kind:'planet', id:p.id, d,
          name: col ? col.name : (G.scanned.has(p.id) ? sysPlanetName(sys,p) : 'UNKNOWN BODY') };
      }
    }
    if(sys.station){
      const pos = stationPos(sys, G.time);
      const d = hyp(pos.x-G.x, pos.y-G.y);
      if(d < 165 && (!best || d < best.d))
        best = { kind:'station', id:sys.station.id, d, name:sys.station.name };
    }
  }
  return best;
}
function sysPlanetName(sys, p){ return sys.name+' '+ROMAN[p.i]; }
function interact(){
  const t = computeInteract();
  if(!t){ return; }
  SND.ensure(); SND.blip();
  G.vx = 0; G.vy = 0;
  /* anchor the ship to the body so it rides along with its orbit while docked */
  let pos = null;
  if(t.kind==='planet'){ const ref = PIDX.get(t.id); if(ref) pos = planetPos(ref.sys, ref.p, G.time); }
  else { const ref = SIDX.get(t.id); if(ref) pos = stationPos(ref.sys, G.time); }
  G.dockAnchor = pos ? { kind:t.kind, id:t.id, dx:G.x-pos.x, dy:G.y-pos.y } : null;
  if(t.kind==='planet') showPlanet(t.id);
  else showStation(t.id);
}

/* ---------------- ECONOMY ACTIONS ---------------- */
const COLONIZE_COST = {metal:15, organics:10, credits:100};
function extractorCost(lvl){ // cost to buy level lvl+1
  return [{metal:10,credits:50},{metal:20,credits:150},{metal:40,credits:350},{metal:70,credits:700}][lvl];
}
const siloCost    = n => ({metal:15+10*n, credits:100+100*n});
const habCost     = n => ({metal:20, organics:15, credits:200+150*n});
const depotCost   = () => ({metal:15, credits:150});
const termCost    = () => ({metal:25, credits:300});

function colonize(pid){
  const ref = PIDX.get(pid); if(!ref || G.colonies[pid]) return;
  if(!canColonize(ref.p.type)){ SND.err(); return; }
  if(!pay(COLONIZE_COST)){ SND.err(); toast('INSUFFICIENT SUPPLIES FOR COLONY', 'bad'); return; }
  const storage = {}; for(const k of RESKEYS) storage[k]=0;
  G.colonies[pid] = { name: sysPlanetName(ref.sys, ref.p), b:{extractor:0,silo:0,habitat:0,depot:0,terminal:0}, storage };
  SND.thunk(); toast('COLONY ESTABLISHED — '+G.colonies[pid].name, 'good');
  spawnBurst(planetPos(ref.sys, ref.p, G.time), ref.p.hue);
  showPlanet(pid); saveGame();
}
function buildAt(pid, key){
  const col = G.colonies[pid]; if(!col) return;
  const ref = PIDX.get(pid);
  let cost = null, ok = true, label = '';
  if(key==='extractor'){
    const lvl = col.b.extractor, max = colonySlots(ref.p);
    if(lvl>=max) ok=false; else { cost = extractorCost(lvl); label = EXTNAME[ref.p.type]; }
  } else if(key==='silo'){ if(col.b.silo>=3) ok=false; else { cost=siloCost(col.b.silo); label='STORAGE SILO'; } }
  else if(key==='habitat'){ if(col.b.habitat>=3) ok=false; else { cost=habCost(col.b.habitat); label='HABITAT DOME'; } }
  else if(key==='depot'){ if(col.b.depot) ok=false; else { cost=depotCost(); label='FUEL DEPOT'; } }
  else if(key==='terminal'){
    if(!hasR('log1')) ok=false;
    else if(!col.b.terminal){ cost=termCost(); label='FREIGHT TERMINAL'; }
    else if(col.b.terminal===1 && hasR('logA')){ cost=termUpCost(); label='FREIGHT TERMINAL II'; }
    else ok=false;
  }
  if(!ok || !cost){ SND.err(); return; }
  if(!pay(cost)){ SND.err(); toast('INSUFFICIENT RESOURCES — HAUL METAL HERE', 'bad'); return; }
  col.b[key]++;
  G.flags.built = true;
  SND.thunk(); toast(label+' CONSTRUCTED', 'good');
  showPlanet(pid); saveGame();
}
function collectAll(pid){
  const col = G.colonies[pid]; if(!col) return;
  let moved = 0;
  for(const k of RESKEYS){
    const space = cargoCap() - cargoUsed();
    if(space<=0) break;
    const take = Math.min(col.storage[k], space);
    if(take>0){ col.storage[k] -= take; G.cargo[k] += take; moved += take; }
  }
  if(moved>0){ G.flags.collected = true; SND.coin(); toast('COLLECTED '+fmt(moved)+' UNITS'); }
  else { SND.err(); toast(cargoUsed()>=cargoCap()?'CARGO HOLD FULL':'NOTHING TO COLLECT', 'bad'); }
  showPlanet(pid);
}
function repairColony(pid){
  const need = Math.ceil((maxHull()-G.hull)/3);
  const use = Math.min(need, Math.floor(G.cargo.metal));
  if(use<=0){ SND.err(); return; }
  G.cargo.metal -= use; G.hull = Math.min(maxHull(), G.hull + use*3);
  SND.thunk(); toast('HULL PATCHED (+'+(use*3)+')');
  showPlanet(pid);
}
function sellRes(sid, res, amt){
  const ref = SIDX.get(sid); if(!ref) return;
  const st = ref.sys.station;
  const q = Math.min(amt==='all' ? G.cargo[res] : amt, G.cargo[res]);
  if(q<=0){ SND.err(); return; }
  const gain = Math.floor(q * BASEPRICE[res] * st.prices[res]);
  G.cargo[res] -= q; G.credits += gain;
  G.flags.sold = true;
  SND.coin(); toast('SOLD '+fmt(q)+' '+RESMETA[res].n+' — ¤'+fmt(gain), 'good');
  showStation(sid);
}
let TRADE_AMT = 1; // shared buy/sell quantity: 1, 10, or 'all'
window.setTradeAmt = (sid, v) => { TRADE_AMT = v==='all' ? 'all' : +v; showStation(sid); };
const BUY_MARKUP = 1.4; // stations resell above their local price
function buyPrice(st, res){ return BASEPRICE[res] * st.prices[res] * BUY_MARKUP; }
function buyRes(sid, res, amt){
  const ref = SIDX.get(sid); if(!ref) return;
  const st = ref.sys.station;
  const price = buyPrice(st, res);
  const space = cargoCap() - cargoUsed();
  const afford = Math.floor(G.credits / price);
  const q = Math.min(amt==='all' ? 1e9 : amt, space, afford);
  if(q<=0){
    SND.err();
    toast(space<=0 ? 'CARGO HOLD FULL' : 'INSUFFICIENT CREDITS', 'bad');
    return;
  }
  const cost = Math.ceil(q*price);
  G.credits -= cost; G.cargo[res] += q;
  SND.coin(); toast('BOUGHT '+fmt(q)+' '+RESMETA[res].n+' — ¤'+fmt(cost), 'good');
  showStation(sid);
}
window.buyRes = buyRes;
function buyFuel(sid, amt){
  const need = FUELMAX - G.fuel;
  const q = Math.min(amt==='fill' ? need : amt, need);
  const cost = Math.ceil(q*2);
  if(q<=0.5){ SND.err(); return; }
  if(G.credits < cost){ SND.err(); toast('INSUFFICIENT CREDITS', 'bad'); return; }
  G.credits -= cost; G.fuel += q;
  SND.blip(); showStation(sid);
}
function repairStation(sid){
  const need = maxHull() - G.hull;
  const cost = Math.ceil(need*3);
  if(need<=0){ SND.err(); return; }
  if(G.credits < cost){ SND.err(); toast('INSUFFICIENT CREDITS', 'bad'); return; }
  G.credits -= cost; G.hull = maxHull();
  SND.thunk(); toast('HULL FULLY REPAIRED');
  showStation(sid);
}
function doResearch(id){
  const r = RESEARCH.find(x=>x.id===id);
  if(!r || hasR(id)) return;
  if(r.req && !hasR(r.req)){ SND.err(); return; }
  if(!pay(r.cost)){ SND.err(); toast('NEED '+costStr(r.cost), 'bad'); return; }
  G.research.add(id);
  SND.ping(); toast('RESEARCH COMPLETE — '+r.name, 'good');
  showResearch(); saveGame();
}

/* ---------------- ROUTES ---------------- */
function addRoute(fromPid, to){
  const col = G.colonies[fromPid];
  if(!col || !col.b.terminal){ SND.err(); toast('SOURCE NEEDS A FREIGHT TERMINAL', 'bad'); return false; }
  if(routesFrom(fromPid).length >= termRouteCap(col)){
    SND.err();
    toast(col.b.terminal>=2 ? 'TERMINAL AT ROUTE LIMIT (3)' : 'UPGRADE THE TERMINAL FOR MORE ROUTES', 'bad');
    return false;
  }
  if(to.k==='p' && !G.colonies[to.id]){ SND.err(); return false; }
  if(G.credits < 200){ SND.err(); toast('ROUTE COSTS ¤200', 'bad'); return false; }
  G.credits -= 200;
  G.routes.push({ from:fromPid, to, t:0, dir:1, load:null, lvl:1 });
  SND.coin(); toast('TRADE ROUTE ESTABLISHED', 'good'); saveGame();
  return true;
}
function delRoute(i){
  if(G.routes[i]){ G.routes.splice(i,1); SND.blip(); }
}
function routeEnds(r){
  const a = PIDX.get(r.from);
  const A = planetPos(a.sys, a.p, G.time);
  let B;
  if(r.to.k==='p'){ const b = PIDX.get(r.to.id); B = planetPos(b.sys, b.p, G.time); }
  else { const b = SIDX.get(r.to.id); B = stationPos(b.sys, G.time); }
  return {A, B};
}
function routesUpdate(dt){
  for(const r of G.routes){
    const {A, B} = routeEnds(r);
    const d = Math.max(200, hyp(B.x-A.x, B.y-A.y));
    const lv = FR_LVL[r.lvl||1];
    r.load = r.load || {};
    let carried = 0; for(const k of RESKEYS) carried += r.load[k]||0;
    if(r.dir===1 && r.t<=0){
      /* at the source dock: top up from storage (undelivered leftovers stay aboard) */
      const col = G.colonies[r.from];
      if(col){
        let cap = lv.cap - carried;
        for(const k of RESKEYS){
          if(cap<=0) break;
          const take = Math.min(col.storage[k], cap);
          if(take>0){ col.storage[k]-=take; r.load[k]=(r.load[k]||0)+take; cap-=take; carried+=take; }
        }
      }
      if(carried <= 0.001){ r.t = 0; continue; } /* nothing to haul — hold at the dock */
    }
    /* speed scales with load: empty flies at max, a full hold slows to min */
    const spd = lerp(lv.spdMax, lv.spdMin, clamp(carried/lv.cap, 0, 1));
    r.t += (dt*spd/d) * r.dir;
    if(r.dir===1 && r.t>=1){
      r.t = 1; r.dir = -1;
      if(r.to.k==='p'){
        /* deliver only what fits under the destination's storage cap; keep the rest aboard */
        const dst = G.colonies[r.to.id];
        if(dst){
          const cap2 = colonyCap(dst);
          for(const k of RESKEYS){
            const amt = r.load[k]||0; if(!amt) continue;
            const dep = Math.min(amt, Math.max(0, cap2 - dst.storage[k]));
            dst.storage[k] += dep;
            if(amt - dep > 0.001) r.load[k] = amt - dep; else delete r.load[k];
          }
        }
      } else {
        const st = SIDX.get(r.to.id).sys.station;
        let gain = 0;
        for(const k of RESKEYS) if(r.load[k]) gain += r.load[k]*BASEPRICE[k]*st.prices[k];
        gain = Math.floor(gain);
        r.load = {};
        if(gain>0){ G.credits += gain; toast('FREIGHT SOLD — ¤'+fmt(gain)); }
      }
    }
    if(r.dir===-1 && r.t<=0){ r.t = 0; r.dir = 1; } /* leftovers merge into the next load */
  }
}

/* ---------------- WARP ---------------- */
function targetInfo(id){ // planets and stations share track/warp plumbing
  if((''+id).indexOf('st')===0){
    const ref = SIDX.get(id); if(!ref) return null;
    return { pos: stationPos(ref.sys, G.time), sys: ref.sys, size: 40, name: ref.sys.station.name };
  }
  const ref = PIDX.get(id); if(!ref) return null;
  const col = G.colonies[id];
  return { pos: planetPos(ref.sys, ref.p, G.time), sys: ref.sys, size: ref.p.size,
           name: col ? col.name : (G.scanned.has(id) ? sysPlanetName(ref.sys, ref.p) : 'TARGET') };
}
function warpCost(id){
  const t = targetInfo(id); if(!t) return 0;
  return hyp(t.pos.x-G.x, t.pos.y-G.y)/900 * fuelMult();
}
let WARPFX = 0;
function tryWarp(id){
  if(!hasR('warp1') || G.warpCd>0) { SND.err(); return; }
  const t = targetInfo(id); if(!t) return;
  const cost = warpCost(id);
  if(G.fuel < cost){ SND.err(); toast('INSUFFICIENT FUEL FOR WARP ('+Math.ceil(cost)+' NEEDED)', 'bad'); return; }
  const away = Math.atan2(t.pos.y-t.sys.y, t.pos.x-t.sys.x);
  G.fuel -= cost;
  G.x = t.pos.x + Math.cos(away)*(t.size+280);
  G.y = t.pos.y + Math.sin(away)*(t.size+280);
  G.vx = 0; G.vy = 0; G.warpCd = 4; G.dockAnchor = null;
  WARPFX = 1; SND.warp();
  closeMap();
  toast('WARP COMPLETE — '+t.name);
}

/* ---------------- MILESTONES ---------------- */
function milestoneDone(id){
  switch(id){
    case 'm_scan':   return G.scanned.size>0;
    case 'm_col1':   return Object.keys(G.colonies).length>0;
    case 'm_build':  return !!G.flags.built;
    case 'm_collect':return !!G.flags.collected;
    case 'm_sell':   return !!G.flags.sold;
    case 'm_res':    return G.research.size>0;
    case 'm_col3':   return Object.keys(G.colonies).length>=3;
    case 'm_route':  return G.routes.length>0;
    case 'm_vis10':  return G.visited.size>=10;
    case 'm_anom5':  return G.anomTaken.size>=5;
    case 'm_cr5k':   return G.credits>=5000;
    case 'm_col6':   return Object.keys(G.colonies).length>=6;
  }
  return false;
}
let msTimer = 0;
function checkMilestones(dt){
  msTimer -= dt; if(msTimer>0) return;
  msTimer = 0.5;
  for(const m of MILESTONES){
    if(G.milestones[m.id]) continue;
    if(milestoneDone(m.id)){
      G.milestones[m.id] = true;
      if(m.r.credits) G.credits += m.r.credits;
      if(m.r.crystal) G.cargo.crystal += m.r.crystal;
      const rw = [];
      if(m.r.credits) rw.push('¤'+m.r.credits);
      if(m.r.crystal) rw.push(m.r.crystal+' CR');
      SND.ping();
      toast('MILESTONE — '+m.t+'  [+'+rw.join(' +')+']', 'good');
    }
  }
}
function currentObjective(){
  for(const m of MILESTONES) if(!G.milestones[m.id]) return m.t;
  return 'THE NETWORK IS YOURS, COMMANDER';
}

/* ---------------- SIMULATION ---------------- */
let HEAT = 0, saveTimer = 0;
function update(dt){
  G.time += dt; G.playSec += dt;
  G.warpCd = Math.max(0, G.warpCd - dt);
  G.handCd = Math.max(0, (G.handCd||0) - dt);
  if(G.navTarget){ // arrived at tracked target -> clear the pointer
    const t = targetInfo(G.navTarget.id);
    if(!t) G.navTarget = null;
    else if(hyp(t.pos.x-G.x, t.pos.y-G.y) < t.size + 340){
      G.navTarget = null;
      SND.ping(); toast('NAV TARGET REACHED', 'good');
    }
  }
  WARPFX = Math.max(0, WARPFX - dt*1.4);
  findCurSys();

  /* ship control — keyboard: W thrust · A/D turn · S brake · SPACE/SHIFT boost.
     Touch stick: point in a direction to steer + thrust that way. */
  const controlsOn = !modalOpen();
  const iv = controlsOn ? stickVec() : {x:0,y:0,on:false};
  const kc = controlsOn ? keyCtl() : {turn:0, thrust:false, brake:false};
  const wantThrust = iv.on || kc.thrust;
  const boosting = controlsOn && (keys.Space||keys.ShiftLeft||keys.ShiftRight||boostHeld) && wantThrust && G.fuel>0.2;
  let thrusting = false;
  if(iv.on){ // stick steers the ship toward where it points
    const target = Math.atan2(iv.y, iv.x);
    let da = target - G.ang;
    while(da>Math.PI) da-=TAU; while(da<-Math.PI) da+=TAU;
    G.ang += clamp(da, -4.2*dt, 4.2*dt);
  } else if(kc.turn){
    G.ang += 3.4*dt*kc.turn;
  }
  if(wantThrust){
    const noFuel = G.fuel<=0.05;
    const acc = 380 * spdMult() * (boosting?1.85:1) * (noFuel?0.25:1);
    G.vx += Math.cos(G.ang)*acc*dt;
    G.vy += Math.sin(G.ang)*acc*dt;
    if(!noFuel) G.fuel = Math.max(0, G.fuel - (0.5 + (boosting?1.2:0))*fuelMult()*dt);
    thrusting = true;
    if(Math.random()<dt*30) spawnThrust();
  }
  if(kc.brake){ G.vx *= Math.pow(0.02, dt); G.vy *= Math.pow(0.02, dt); }
  const drag = Math.exp(-1.15*dt);
  G.vx *= drag; G.vy *= drag;
  G.x += G.vx*dt; G.y += G.vy*dt;
  G.thrusting = thrusting; G.boosting = boosting;

  /* soft world boundary */
  const dw = hyp(G.x, G.y);
  if(dw > WORLD_R+2500){ G.vx -= G.x/dw*300*dt; G.vy -= G.y/dw*300*dt; }

  /* docked: stay anchored to the body — ride along with its orbit */
  if(G.dockAnchor && panelVisible()){
    const a = G.dockAnchor;
    let pos = null;
    if(a.kind==='planet'){ const ref = PIDX.get(a.id); if(ref) pos = planetPos(ref.sys, ref.p, G.time); }
    else { const ref = SIDX.get(a.id); if(ref) pos = stationPos(ref.sys, G.time); }
    if(pos){ G.x = pos.x + a.dx; G.y = pos.y + a.dy; G.vx = 0; G.vy = 0; }
  } else if(G.dockAnchor && !panelVisible()){
    G.dockAnchor = null;
  }

  /* system discovery + scanning + heat */
  let heatTarget = 0;
  if(CURSYS){
    if(!G.visited.has(CURSYS.i)){
      G.visited.add(CURSYS.i);
      SND.ping(); toast('SYSTEM CHARTED — '+CURSYS.name, 'good');
    }
    const sr = scanRange();
    for(const p of CURSYS.planets){
      if(G.scanned.has(p.id)) continue;
      const pos = planetPos(CURSYS, p, G.time);
      if(hyp(pos.x-G.x, pos.y-G.y) < sr + p.size){
        G.scanned.add(p.id);
        SND.scanp();
        toast('SCAN COMPLETE — '+sysPlanetName(CURSYS,p)+' ['+PTYPES[p.type].label+']');
      }
    }
    /* star heat */
    const ds = hyp(CURSYS.x-G.x, CURSYS.y-G.y);
    const hz = CURSYS.sun.r + 300;
    if(ds < hz){
      const k = clamp((hz-ds)/300, 0, 1.4);
      heatTarget = clamp(k,0,1);
      G.hull -= 22*k*k*heatMult()*dt;
    }
  }
  HEAT = lerp(HEAT, heatTarget, 1-Math.exp(-6*dt));

  /* anomalies */
  for(const a of GAL.anomalies){
    if(G.anomTaken.has(a.id)) continue;
    if(hyp(a.x-G.x, a.y-G.y) < 80) pickupAnomaly(a);
  }

  /* colony production */
  for(const pid in G.colonies){
    const col = G.colonies[pid];
    const lvl = col.b.extractor;
    if(lvl<=0) continue;
    const ref = PIDX.get(pid);
    const mult = lvl * colonyMult(col);
    const cap = colonyCap(col);
    for(const k in ref.p.rates){
      if(col.storage[k] < cap)
        col.storage[k] = Math.min(cap, col.storage[k] + ref.p.rates[k]/60*mult*dt);
    }
  }

  /* fuel depot auto-refuel when near own colony with depot */
  const near = computeInteract();
  if(near && near.kind==='planet'){
    const col = G.colonies[near.id];
    if(col && col.b.depot && G.fuel < FUELMAX){
      let pump = 10*dt;
      while(pump>0 && G.fuel<FUELMAX){
        if(col.storage.gas >= 0.5){ const u=Math.min(0.5,pump/2); col.storage.gas-=u; G.fuel=Math.min(FUELMAX,G.fuel+u*2); pump-=u*2; }
        else if(col.storage.ice >= 0.5){ const u=Math.min(0.5,pump); col.storage.ice-=u; G.fuel=Math.min(FUELMAX,G.fuel+u); pump-=u; }
        else break;
      }
    }
  }
  G.nearTarget = near;

  routesUpdate(dt);
  checkMilestones(dt);
  updateParticles(dt);

  /* hull failure -> tow */
  if(G.hull <= 0){
    let tow = null, td = 1e12;
    for(const pid in G.colonies){
      const ref = PIDX.get(pid);
      const pos = planetPos(ref.sys, ref.p, G.time);
      const d = hyp(pos.x-G.x, pos.y-G.y);
      if(d<td){ td=d; tow=pos; }
    }
    if(!tow){ const stp = stationPos(GAL.systems[0], G.time); tow = {x:stp.x+210,y:stp.y+120}; }
    G.x = tow.x+180; G.y = tow.y+120; G.vx=0; G.vy=0; G.dockAnchor = null;
    G.hull = Math.floor(maxHull()*0.5); G.fuel = Math.max(G.fuel, FUELMAX*0.4);
    G.credits = Math.floor(G.credits*0.9);
    SND.err(); toast('SHIP DISABLED — TOWED TO SAFETY (-10% CREDITS)', 'bad');
  }

  saveTimer += dt;
  if(saveTimer > 25){ saveTimer = 0; saveGame(); }
}

function pickupAnomaly(a){
  G.anomTaken.add(a.id);
  const R = mulberry32(seedFromString(a.id)+G.seed);
  if(a.type==='cache'){
    const c = 80 + Math.floor(R()*150);
    G.credits += c;
    let me = 8 + Math.floor(R()*14), or = 5 + Math.floor(R()*10);
    let space = Math.max(0, cargoCap() - cargoUsed());
    me = Math.min(me, space); space -= me;
    or = Math.min(or, space);
    G.cargo.metal += me; G.cargo.organics += or;
    SND.coin();
    toast('SUPPLY CACHE RECOVERED — ¤'+c+(me?' +'+me+' ME':'')+(or?' +'+or+' OR':''), 'good');
  } else if(a.type==='crystal'){
    const c = 2 + Math.floor(R()*4);
    G.cargo.crystal += c; SND.ping();
    toast('CRYSTAL FORMATION HARVESTED — +'+c+' CR', 'good');
  } else {
    const c = 100 + Math.floor(R()*200), cr = 1 + Math.floor(R()*3);
    G.credits += c; G.cargo.crystal += cr; SND.ping();
    toast('DERELICT SALVAGED — ¤'+c+' +'+cr+' CR', 'good');
    toast(LORE[Math.floor(R()*LORE.length)]);
  }
  spawnBurst({x:a.x, y:a.y}, 48);
}

/* ---------------- PARTICLES ---------------- */
const PARTS = [];
function spawnThrust(){
  const back = G.ang + Math.PI;
  PARTS.push({ x:G.x+Math.cos(back)*14, y:G.y+Math.sin(back)*14,
    vx:G.vx*0.3+Math.cos(back)*80+(Math.random()-.5)*40,
    vy:G.vy*0.3+Math.sin(back)*80+(Math.random()-.5)*40,
    life:.5, max:.5, hue:34, sz:2.5 });
}
function spawnBurst(pos, hue){
  for(let i=0;i<26;i++){
    const a = Math.random()*TAU, s = 60+Math.random()*200;
    PARTS.push({ x:pos.x, y:pos.y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:.9, max:.9, hue, sz:3 });
  }
}
function updateParticles(dt){
  for(let i=PARTS.length-1;i>=0;i--){
    const p = PARTS[i];
    p.life -= dt; p.x += p.vx*dt; p.y += p.vy*dt;
    if(p.life<=0) PARTS.splice(i,1);
  }
}

const WCV = $('world'), WX = WCV.getContext('2d');
const MMC = $('mm'), MMX = MMC.getContext('2d');
