const cam = { x:0, y:0, zoom:0.55 };
let demoT = 0;

function tonesFor(body){ // 5 shades of one hue, dark -> light
  if(body._tones) return body._tones;
  const Ls = [15, 27, 41, 55, 70];
  body._tones = Ls.map(l => hsl(body.hue!==undefined?body.hue:body.h, body.sat!==undefined?body.sat:body.s, l));
  body._tonesA = (i,a)=> hsl(body.hue!==undefined?body.hue:body.h, body.sat!==undefined?body.sat:body.s, Ls[i], a);
  return body._tones;
}

/* --- starfield layers (infinite, hashed) --- */
function drawStars(par, tile, per, size, alphaBase, t){
  const ox = cam.x*par, oy = cam.y*par;
  const x0 = Math.floor((ox - W/2)/tile), x1 = Math.floor((ox + W/2)/tile);
  const y0 = Math.floor((oy - H/2)/tile), y1 = Math.floor((oy + H/2)/tile);
  for(let ty=y0; ty<=y1; ty++) for(let tx=x0; tx<=x1; tx++){
    const n = Math.floor(hash3(tx,ty,1)*per)+1;
    for(let k=0;k<n;k++){
      const hx = hash3(tx,ty,k*3+7), hy = hash3(tx,ty,k*3+8), hb = hash3(tx,ty,k*3+9);
      const sx = tx*tile + hx*tile - ox + W/2;
      const sy = ty*tile + hy*tile - oy + H/2;
      const tw = 0.65 + 0.35*Math.sin(t*(0.5+hb*2)+hb*20);
      WX.globalAlpha = alphaBase*tw;
      WX.fillStyle = hb>0.9 ? '#ffe9c9' : (hb<0.08 ? '#bcd6ff' : '#e8ecf2');
      WX.fillRect(sx, sy, size, size);
    }
  }
  WX.globalAlpha = 1;
}
function drawNebula(t){
  const par = 0.12, tile = 2300;
  const ox = cam.x*par, oy = cam.y*par;
  const x0 = Math.floor((ox - W/2)/tile)-1, x1 = Math.floor((ox + W/2)/tile)+1;
  const y0 = Math.floor((oy - H/2)/tile)-1, y1 = Math.floor((oy + H/2)/tile)+1;
  const hues = [206, 276, 330, 162, 26];
  for(let ty=y0; ty<=y1; ty++) for(let tx=x0; tx<=x1; tx++){
    if(hash3(tx,ty,44) > 0.4) continue;
    const hx = hash3(tx,ty,45), hy = hash3(tx,ty,46);
    const sx = tx*tile + hx*tile - ox + W/2;
    const sy = ty*tile + hy*tile - oy + H/2;
    const r = 380 + hash3(tx,ty,47)*620;
    const hue = hues[Math.floor(hash3(tx,ty,48)*hues.length)];
    const g = WX.createRadialGradient(sx,sy,0,sx,sy,r);
    g.addColorStop(0, hsl(hue,60,40,.05));
    g.addColorStop(1, hsl(hue,60,40,0));
    WX.fillStyle = g;
    WX.fillRect(sx-r, sy-r, r*2, r*2);
  }
}

/* --- celestial bodies --- */
function drawSunBody(sys, t){
  const s = sys.sun; tonesFor(s);
  const pulse = 1 + 0.02*Math.sin(t*1.2 + sys.i);
  const r = s.r*pulse;
  // outer glow
  const g = WX.createRadialGradient(sys.x,sys.y, r*0.4, sys.x,sys.y, r*2.4);
  g.addColorStop(0, hsl(s.h, s.s, 62, .5));
  g.addColorStop(0.5, hsl(s.h, s.s, 55, .12));
  g.addColorStop(1, hsl(s.h, s.s, 50, 0));
  WX.fillStyle = g;
  WX.fillRect(sys.x-r*2.4, sys.y-r*2.4, r*4.8, r*4.8);
  // banded core, tones of one hue
  const Ls = [88, 76, 62, 48];
  const Rs = [0.55, 0.75, 0.9, 1];
  for(let i=3;i>=0;i--){
    WX.beginPath(); WX.arc(sys.x, sys.y, r*Rs[i], 0, TAU);
    WX.fillStyle = hsl(s.h, s.s, Ls[i]);
    WX.fill();
  }
  // slow corona ring
  WX.save();
  WX.translate(sys.x, sys.y); WX.rotate(t*0.06);
  WX.strokeStyle = hsl(s.h, s.s, 70, .3);
  WX.lineWidth = 3; WX.setLineDash([26, 34]);
  WX.beginPath(); WX.arc(0,0, r*1.14, 0, TAU); WX.stroke();
  WX.setLineDash([]);
  WX.restore();
}
function drawPlanetBody(sys, p, x, y, t){
  const T = tonesFor(p), r = p.size;
  const sunAng = Math.atan2(sys.y - y, sys.x - x); // light comes from the sun
  WX.save();
  WX.translate(x, y);
  WX.beginPath(); WX.arc(0,0,r,0,TAU);
  WX.fillStyle = T[2]; WX.fill();
  WX.save(); WX.clip();
  /* features, rotating slowly, all tones of the planet's own hue */
  WX.save(); WX.rotate(t*p.rotSpd);
  const f = p.f;
  if(f.craters){
    for(const c of f.craters){
      const cx = Math.cos(c.a)*c.d*r, cy = Math.sin(c.a)*c.d*r, cr = c.r*r;
      WX.beginPath(); WX.arc(cx, cy, cr, 0, TAU); WX.fillStyle = T[1]; WX.fill();
      WX.beginPath(); WX.arc(cx, cy, cr, -2.4, -0.6);
      WX.strokeStyle = T[3]; WX.lineWidth = Math.max(1.2, cr*0.22); WX.stroke();
    }
  }
  if(f.dunes){
    WX.lineWidth = r*0.07;
    for(const d of f.dunes){
      WX.strokeStyle = p._tonesA(d.t, .55);
      WX.beginPath(); WX.arc(0, d.y*r*2.2, r*1.9, Math.PI*1.36, Math.PI*1.64); WX.stroke();
    }
  }
  if(f.bands){
    for(const b of f.bands){
      WX.fillStyle = p._tonesA(b.t, .75);
      WX.fillRect(-r, b.y*r, r*2, b.h*r);
    }
    if(f.storm){
      const sx2 = Math.cos(f.storm.a)*f.storm.d*r, sy2 = Math.sin(f.storm.a)*f.storm.d*r*0.6;
      WX.beginPath(); WX.ellipse(sx2, sy2, f.storm.r*r*1.4, f.storm.r*r*0.8, 0, 0, TAU);
      WX.fillStyle = T[0]; WX.fill();
      WX.beginPath(); WX.ellipse(sx2, sy2, f.storm.r*r*1.4, f.storm.r*r*0.8, 0, 0, TAU);
      WX.strokeStyle = T[4]; WX.lineWidth = r*0.02+1; WX.stroke();
    }
  }
  if(f.streaks){ // ice caps + streaks
    WX.fillStyle = T[4];
    WX.beginPath(); WX.arc(0, -r*1.32, r*0.72, 0, TAU); WX.fill();
    WX.beginPath(); WX.arc(0,  r*1.32, r*0.72, 0, TAU); WX.fill();
    WX.strokeStyle = p._tonesA(3,.5); WX.lineWidth = r*0.05;
    for(const s2 of f.streaks){
      WX.beginPath(); WX.moveTo(-r*s2.w, s2.y*r); WX.lineTo(r*s2.w, s2.y*r+r*0.08); WX.stroke();
    }
  }
  if(f.cracks){
    WX.strokeStyle = T[4]; WX.lineWidth = Math.max(1.5, r*0.045);
    WX.lineJoin = 'round';
    for(const pts of f.cracks){
      WX.beginPath();
      for(let i2=0;i2<pts.length;i2++){
        const px = Math.cos(pts[i2][0])*pts[i2][1]*r, py = Math.sin(pts[i2][0])*pts[i2][1]*r;
        i2===0 ? WX.moveTo(px,py) : WX.lineTo(px,py);
      }
      WX.stroke();
    }
    WX.globalAlpha = .35 + .15*Math.sin(t*2+p.i);
    WX.strokeStyle = p._tonesA(4,.6); WX.lineWidth = Math.max(3, r*0.1);
    for(const pts of f.cracks){
      WX.beginPath();
      for(let i2=0;i2<pts.length;i2++){
        const px = Math.cos(pts[i2][0])*pts[i2][1]*r, py = Math.sin(pts[i2][0])*pts[i2][1]*r;
        i2===0 ? WX.moveTo(px,py) : WX.lineTo(px,py);
      }
      WX.stroke();
    }
    WX.globalAlpha = 1;
  }
  if(f.blobs){
    const dark = p.type==='ocean';
    WX.fillStyle = dark ? T[1] : p._tonesA(1,.9);
    for(const b of f.blobs){
      const bx = Math.cos(b.a)*b.d*r, by = Math.sin(b.a)*b.d*r;
      WX.beginPath(); WX.arc(bx, by, b.r*r, 0, TAU); WX.fill();
      WX.beginPath(); WX.arc(bx+Math.cos(b.a2)*b.r*r, by+Math.sin(b.a2)*b.r*r, b.r2*r, 0, TAU); WX.fill();
    }
    if(p.type==='terran'){ WX.fillStyle = T[4];
      WX.beginPath(); WX.arc(0,-r*1.36, r*0.62, 0, TAU); WX.fill(); }
  }
  WX.restore(); // rotation
  /* banded day/night shading toward the sun — same hue only */
  const hx = Math.cos(sunAng)*r*0.55, hy = Math.sin(sunAng)*r*0.55;
  const hi = WX.createRadialGradient(hx,hy,0, hx,hy, r*1.9);
  hi.addColorStop(0.00, p._tonesA(4,.42)); hi.addColorStop(0.22, p._tonesA(4,.42));
  hi.addColorStop(0.221,p._tonesA(4,.16)); hi.addColorStop(0.42, p._tonesA(4,.16));
  hi.addColorStop(0.421,'rgba(0,0,0,0)');
  hi.addColorStop(0.62, 'rgba(0,0,0,0)');
  hi.addColorStop(0.621,p._tonesA(0,.38)); hi.addColorStop(0.80, p._tonesA(0,.38));
  hi.addColorStop(0.801,p._tonesA(0,.72)); hi.addColorStop(1.00, p._tonesA(0,.72));
  WX.fillStyle = hi;
  WX.fillRect(-r,-r,r*2,r*2);
  WX.restore(); // clip
  /* thin rim + atmosphere for lush worlds */
  WX.beginPath(); WX.arc(0,0,r,0,TAU);
  WX.strokeStyle = p._tonesA(3,.4); WX.lineWidth = 1.5; WX.stroke();
  if(p.type==='terran'||p.type==='ocean'||p.type==='gas'){
    WX.beginPath(); WX.arc(0,0,r*1.07,0,TAU);
    WX.strokeStyle = p._tonesA(4,.16); WX.lineWidth = r*0.09; WX.stroke();
  }
  /* colony markers */
  const col = G && G.colonies[p.id];
  if(!col && G && G.scanned.has(p.id) && !canColonize(p.type)){
    /* habitat-locked world: quiet red dashed ring until the tech is researched */
    WX.save(); WX.rotate(t*0.08);
    WX.strokeStyle = 'rgba(255,122,107,.42)'; WX.lineWidth = 1.4;
    WX.setLineDash([4, 11]);
    WX.beginPath(); WX.arc(0,0, r+14, 0, TAU); WX.stroke();
    WX.setLineDash([]); WX.restore();
  }
  if(col){
    WX.save(); WX.rotate(t*0.25);
    WX.strokeStyle = 'rgba(255,180,84,.65)'; WX.lineWidth = 1.6;
    WX.setLineDash([10, 14]);
    WX.beginPath(); WX.arc(0,0, r+14, 0, TAU); WX.stroke();
    WX.setLineDash([]); WX.restore();
    const nd = sunAng + Math.PI; // night side lights
    WX.fillStyle = '#ffd166';
    for(let k2=0;k2<3;k2++){
      const a2 = nd + (k2-1)*0.45;
      WX.beginPath(); WX.arc(Math.cos(a2)*r*0.82, Math.sin(a2)*r*0.82, Math.max(1.6, r*0.035), 0, TAU); WX.fill();
    }
  }
  WX.restore();
  /* labels */
  if(G && (G.scanned.has(p.id) || col)){
    WX.font = `${11/cam.zoom}px ui-monospace, monospace`;
    WX.textAlign = 'center';
    WX.fillStyle = col ? 'rgba(255,180,84,.9)' : 'rgba(233,220,194,.55)';
    WX.fillText((col?col.name:sysPlanetName(sys,p)), x, y + r + 26/cam.zoom);
  }
}
function drawStationBody(sys, t){
  const pos = stationPos(sys, t);
  WX.save(); WX.translate(pos.x, pos.y); WX.rotate(t*0.1);
  const T = {hue:188, sat:46}; tonesFor(T);
  WX.strokeStyle = T._tones[3]; WX.fillStyle = T._tones[1]; WX.lineWidth = 2.5;
  WX.strokeRect(-16,-16,32,32); WX.fillRect(-16,-16,32,32);
  WX.beginPath(); WX.moveTo(-46,0); WX.lineTo(46,0); WX.stroke();
  WX.fillStyle = T._tones[2];
  WX.fillRect(-46,-9,16,18); WX.fillRect(30,-9,16,18);
  WX.strokeRect(-46,-9,16,18); WX.strokeRect(30,-9,16,18);
  WX.restore();
  const blink = (t%1.4)<0.7;
  if(blink){ WX.fillStyle = '#7fe9ff';
    WX.beginPath(); WX.arc(pos.x, pos.y-24, 3, 0, TAU); WX.fill(); }
  WX.font = `${11/cam.zoom}px ui-monospace, monospace`;
  WX.textAlign = 'center';
  WX.fillStyle = 'rgba(127,233,255,.7)';
  WX.fillText(sys.station.name, pos.x, pos.y + 46);
  return pos;
}

/* nav compass — a faint chevron beside the ship. Cyan: nearest station.
   Amber: a planet you chose to TRACK on the galaxy map. */
function navGoal(){
  if(G.navTarget){
    const t = targetInfo(G.navTarget.id);
    if(t) return { x:t.pos.x, y:t.pos.y, amber:true, near: t.size + 260 };
    G.navTarget = null; // stale reference
  }
  let best = null;
  for(const sys of GAL.systems){
    if(!sys.station) continue;
    const pos = stationPos(sys, G.time);
    const d = hyp(pos.x-G.x, pos.y-G.y);
    if(!best || d < best.d) best = { x:pos.x, y:pos.y, d, amber:false, near: 420 };
  }
  return best;
}
function drawCompass(t){
  const goal = navGoal();
  if(!goal) return;
  const d = hyp(goal.x-G.x, goal.y-G.y);
  if(d < goal.near) return; // target is basically on screen
  const a = Math.atan2(goal.y-G.y, goal.x-G.x);
  const R = 54;
  const pulse = 0.32 + 0.10*Math.sin(t*2.2);
  const col = goal.amber ? `rgba(255,180,84,${pulse+0.08})` : `rgba(127,233,255,${pulse})`;
  WX.save();
  WX.translate(G.x, G.y); WX.rotate(a);
  WX.strokeStyle = col; WX.lineWidth = 2.6; WX.lineCap = 'round';
  WX.beginPath(); WX.arc(0, 0, R, -0.42, 0.42); WX.stroke();
  WX.beginPath();
  WX.moveTo(R+2, -6); WX.lineTo(R+10, 0); WX.lineTo(R+2, 6);
  WX.stroke();
  WX.restore();
  /* small upright distance tag just past the chevron */
  WX.font = `${10/cam.zoom}px ui-monospace, monospace`;
  WX.textAlign = 'center';
  WX.fillStyle = goal.amber ? 'rgba(255,180,84,.5)' : 'rgba(127,233,255,.45)';
  const lx = G.x + Math.cos(a)*(R+34/cam.zoom), ly = G.y + Math.sin(a)*(R+34/cam.zoom);
  WX.fillText(d>=1000 ? (d/1000).toFixed(1)+'K' : Math.round(d)+'', lx, ly);
}
function drawShip(t){
  WX.save();
  WX.translate(G.x, G.y); WX.rotate(G.ang);
  if(G.thrusting){
    const fl = 12 + Math.random()*10 + (G.boosting?10:0);
    WX.beginPath();
    WX.moveTo(-13, 5); WX.lineTo(-13-fl, 0); WX.lineTo(-13, -5);
    WX.closePath();
    WX.fillStyle = Math.random()<.5 ? '#ffd166' : '#ff9a5a';
    WX.fill();
  }
  WX.beginPath();
  WX.moveTo(19, 0); WX.lineTo(-12, 10); WX.lineTo(-7, 0); WX.lineTo(-12, -10);
  WX.closePath();
  WX.fillStyle = '#dde6ef'; WX.fill();
  WX.strokeStyle = '#8fa3b8'; WX.lineWidth = 1.5; WX.stroke();
  WX.beginPath(); WX.arc(6, 0, 3.4, 0, TAU);
  WX.fillStyle = '#ffb454'; WX.fill();
  WX.restore();
}

/* --- main world draw --- */
function draw(t){
  WX.setTransform(DPR,0,0,DPR,0,0);
  WX.fillStyle = '#05060a'; WX.fillRect(0,0,W,H);

  /* camera */
  if(MODE==='menu'){
    demoT = t;
    cam.x = Math.cos(t*0.05)*5200 + 800;
    cam.y = Math.sin(t*0.037)*5200;
    cam.zoom = 0.5;
  } else {
    const spd = hyp(G.vx, G.vy);
    const targetZoom = lerp(0.58, 0.42, clamp(spd/700, 0, 1));
    cam.zoom = lerp(cam.zoom, targetZoom, 0.04);
    cam.x = lerp(cam.x, G.x + G.vx*0.35, 0.12);
    cam.y = lerp(cam.y, G.y + G.vy*0.35, 0.12);
  }

  drawNebula(t);
  drawStars(0.30, 430, 5, 1, .45, t);
  drawStars(0.55, 430, 3, 1.4, .6, t);
  drawStars(0.85, 430, 1.6, 2, .85, t);

  WX.save();
  WX.translate(W/2, H/2);
  WX.scale(cam.zoom, cam.zoom);
  WX.translate(-cam.x, -cam.y);
  const viewR = hyp(W,H)/(2*cam.zoom) + 500;
  const simT = MODE==='menu' ? t*0.4 : G.time;

  /* trade route dotted lines (in-world) */
  if(G){
    WX.setLineDash([14, 22]);
    WX.strokeStyle = 'rgba(255,180,84,.13)'; WX.lineWidth = 2/cam.zoom;
    for(const r of G.routes){
      const {A,B} = routeEnds(r);
      if(hyp(A.x-cam.x,A.y-cam.y) > viewR+9000 && hyp(B.x-cam.x,B.y-cam.y) > viewR+9000) continue;
      WX.beginPath(); WX.moveTo(A.x,A.y); WX.lineTo(B.x,B.y); WX.stroke();
    }
    WX.setLineDash([]);
  }

  for(const sys of GAL.systems){
    if(hyp(sys.x-cam.x, sys.y-cam.y) > viewR + sys.maxR) continue;
    /* orbit rings */
    WX.strokeStyle = 'rgba(233,220,194,.05)'; WX.lineWidth = 1.5/cam.zoom;
    for(const p of sys.planets){
      WX.beginPath(); WX.arc(sys.x, sys.y, p.orbit, 0, TAU); WX.stroke();
    }
    drawSunBody(sys, simT);
    if(G && G.visited.has(sys.i)){
      WX.font = `${13/cam.zoom}px ui-monospace, monospace`;
      WX.textAlign = 'center';
      WX.fillStyle = 'rgba(138,129,114,.75)';
      WX.fillText(sys.name, sys.x, sys.y + sys.sun.r + 40/cam.zoom);
    }
    for(const p of sys.planets){
      const pos = planetPos(sys, p, simT);
      if(hyp(pos.x-cam.x, pos.y-cam.y) > viewR + p.size) continue;
      drawPlanetBody(sys, p, pos.x, pos.y, simT);
    }
    if(sys.station) drawStationBody(sys, simT);
  }

  /* anomalies */
  if(G) for(const a of GAL.anomalies){
    if(G.anomTaken.has(a.id)) continue;
    if(hyp(a.x-cam.x, a.y-cam.y) > viewR) continue;
    const pl = 0.6 + 0.4*Math.sin(t*3 + a.x*0.01);
    WX.save(); WX.translate(a.x, a.y); WX.rotate(t*0.8);
    WX.strokeStyle = `rgba(255,209,102,${pl})`; WX.lineWidth = 2.5;
    WX.strokeRect(-9,-9,18,18);
    WX.restore();
    WX.strokeStyle = `rgba(255,209,102,${pl*0.3})`;
    WX.beginPath(); WX.arc(a.x, a.y, 26 + 8*pl, 0, TAU); WX.stroke();
  }

  /* freighters */
  if(G) for(const r of G.routes){
    const {A,B} = routeEnds(r);
    const fx = lerp(A.x, B.x, r.t), fy = lerp(A.y, B.y, r.t);
    if(hyp(fx-cam.x, fy-cam.y) > viewR) continue;
    const fa = Math.atan2(B.y-A.y, B.x-A.x) + (r.dir===-1?Math.PI:0);
    WX.save(); WX.translate(fx, fy); WX.rotate(fa);
    WX.fillStyle = r.dir===1 ? '#ffb454' : 'rgba(255,180,84,.45)';
    WX.beginPath(); WX.moveTo(9,0); WX.lineTo(-7,5); WX.lineTo(-7,-5);
    WX.closePath(); WX.fill();
    WX.restore();
  }

  /* particles */
  for(const p of PARTS){
    WX.globalAlpha = p.life/p.max;
    WX.fillStyle = hsl(p.hue, 90, 62);
    WX.fillRect(p.x - p.sz/2, p.y - p.sz/2, p.sz, p.sz);
  }
  WX.globalAlpha = 1;

  if(MODE==='play'){ drawShip(t); drawCompass(t); }
  WX.restore();

  /* screen fx */
  $('heatFx').style.opacity = HEAT*0.9;
  $('warpFx').style.opacity = WARPFX*0.85;
}

/* ---------------- MINIMAP ---------------- */
const MM_RANGE = 4500;
function drawMinimap(t){
  const s = MMC.width/DPR;
  MMX.setTransform(DPR,0,0,DPR,0,0);
  MMX.clearRect(0,0,s,s);
  MMX.fillStyle = 'rgba(3,4,8,.85)'; MMX.fillRect(0,0,s,s);
  const k = (s/2 - 6)/MM_RANGE;
  const cx = s/2, cy = s/2;
  MMX.save();
  MMX.beginPath(); MMX.arc(cx, cy, s/2 - 3, 0, TAU); MMX.clip();
  for(const sys of GAL.systems){
    const dx = (sys.x-G.x)*k, dy = (sys.y-G.y)*k;
    if(hyp(dx,dy) > s) continue;
    /* motion trails — each planet drags a fading arc covering its last ~45s of
       travel, so faster planets get longer trails and the curve points at its sun */
    const dc = hyp(dx,dy), R = s/2 - 3;
    const TRAIL_T = 45; // seconds of orbital history shown
    MMX.lineWidth = 1.2;
    for(const p of sys.planets){
      const or = p.orbit*k;
      if(Math.abs(dc - or) > R) continue; // arc can never enter the scope
      const aNow = p.a0 + G.time*p.osp;
      const sweep = clamp(Math.abs(p.osp)*TRAIL_T, 0.1, 2.1) * Math.sign(p.osp||1);
      const col = G.colonies[p.id];
      MMX.lineWidth = col ? 2.2 : 1.2;
      const SEG = 7;
      for(let i2=0;i2<SEG;i2++){
        const f0 = i2/SEG, f1 = (i2+1)/SEG;
        const a0 = aNow - sweep*(1-f0), a1 = aNow - sweep*(1-f1);
        const locked = !col && G.scanned.has(p.id) && !canColonize(p.type);
        const alpha = col ? (0.10 + 0.85*f1) : (locked ? (0.06 + 0.36*f1) : (0.04 + 0.30*f1));
        MMX.strokeStyle = col ? `rgba(255,180,84,${alpha})`
          : locked ? `rgba(255,122,107,${alpha})` : `rgba(233,220,194,${alpha})`;
        MMX.beginPath();
        MMX.moveTo(cx+dx+Math.cos(a0)*or, cy+dy+Math.sin(a0)*or);
        MMX.lineTo(cx+dx+Math.cos(a1)*or, cy+dy+Math.sin(a1)*or);
        MMX.stroke();
      }
    }
    const sr = clamp(sys.sun.r*k*2.1, 1.8, 3.6);
    const gl = MMX.createRadialGradient(cx+dx, cy+dy, sr*0.4, cx+dx, cy+dy, sr*2.9);
    gl.addColorStop(0, hsl(sys.sun.h, sys.sun.s, 60, .42));
    gl.addColorStop(1, hsl(sys.sun.h, sys.sun.s, 60, 0));
    MMX.fillStyle = gl;
    MMX.beginPath(); MMX.arc(cx+dx, cy+dy, sr*2.9, 0, TAU); MMX.fill();
    MMX.fillStyle = hsl(sys.sun.h, sys.sun.s, 68);
    MMX.beginPath(); MMX.arc(cx+dx, cy+dy, sr, 0, TAU); MMX.fill();
    for(const p of sys.planets){
      const pos = planetPos(sys, p, G.time);
      const px = (pos.x-G.x)*k, py = (pos.y-G.y)*k;
      const col = G.colonies[p.id];
      MMX.fillStyle = col ? '#ffb454' : hsl(p.hue, p.sat, G.scanned.has(p.id)?62:34);
      MMX.beginPath(); MMX.arc(cx+px, cy+py, col?2.6:1.7, 0, TAU); MMX.fill();
      if(col){ MMX.strokeStyle = 'rgba(255,180,84,.6)';
        MMX.beginPath(); MMX.arc(cx+px, cy+py, 4.6, 0, TAU); MMX.stroke(); }
    }
    if(sys.station){
      const sp = stationPos(sys, G.time);
      const st = sys.station;
      const sor = st.orbit*k;
      if(Math.abs(dc - sor) <= R){ // cyan trail, same time-window as planets
        const aNow = st.a0 + G.time*st.osp;
        const sweep = clamp(Math.abs(st.osp)*TRAIL_T, 0.1, 2.1) * Math.sign(st.osp||1);
        MMX.lineWidth = 1.2;
        const SEG = 7;
        for(let i2=0;i2<SEG;i2++){
          const f0 = i2/SEG, f1 = (i2+1)/SEG;
          const a0 = aNow - sweep*(1-f0), a1 = aNow - sweep*(1-f1);
          MMX.strokeStyle = `rgba(127,233,255,${0.05 + 0.34*f1})`;
          MMX.beginPath();
          MMX.moveTo(cx+dx+Math.cos(a0)*sor, cy+dy+Math.sin(a0)*sor);
          MMX.lineTo(cx+dx+Math.cos(a1)*sor, cy+dy+Math.sin(a1)*sor);
          MMX.stroke();
        }
      }
      MMX.fillStyle = '#7fe9ff';
      MMX.fillRect(cx+(sp.x-G.x)*k-2, cy+(sp.y-G.y)*k-2, 4, 4);
    }
  }
  if(hasR('scan2')){
    const blink = (t%1)<0.55;
    if(blink) for(const a of GAL.anomalies){
      if(G.anomTaken.has(a.id)) continue;
      const dx = (a.x-G.x)*k, dy = (a.y-G.y)*k;
      if(hyp(dx,dy) > s/2) continue;
      MMX.save(); MMX.translate(cx+dx, cy+dy); MMX.rotate(Math.PI/4);
      MMX.strokeStyle = '#ffd166'; MMX.strokeRect(-2.5,-2.5,5,5);
      MMX.restore();
    }
  }
  /* ship */
  MMX.save(); MMX.translate(cx, cy); MMX.rotate(G.ang);
  MMX.fillStyle = '#e9dcc2';
  MMX.beginPath(); MMX.moveTo(6,0); MMX.lineTo(-4,4); MMX.lineTo(-4,-4);
  MMX.closePath(); MMX.fill();
  MMX.restore();
  MMX.restore();
  MMX.strokeStyle = 'rgba(255,180,110,.4)';
  MMX.beginPath(); MMX.arc(cx, cy, s/2-3, 0, TAU); MMX.stroke();
}

/* ---------------- 8. GALAXY MAP OVERLAY ---------------- */
const MC = $('mapC'), MX = MC.getContext('2d');
const MV = { x:0, y:0, s:0.018, mode:'view', srcPid:null, sel:null };
function mapVisible(){ return $('mapWrap').style.display !== 'none'; }
function openMap(){
  if(!G) return;
  $('mapWrap').style.display = 'block';
  MV.x = G.x; MV.y = G.y; MV.mode = 'view'; MV.srcPid = null; MV.sel = null;
  setHint(''); renderSide(null);
  SND.blip();
}
function closeMap(){ $('mapWrap').style.display = 'none'; }
function setHint(t){ $('mapHint').textContent = t; }
function w2m(x,y){ return [(x-MV.x)*MV.s + W/2, (y-MV.y)*MV.s + H/2]; }

/* pan / zoom / pinch / pick */
const mpt = new Map();
let dragMoved = 0;
MC.addEventListener('pointerdown', e=>{
  MC.setPointerCapture(e.pointerId);
  mpt.set(e.pointerId, {x:e.clientX, y:e.clientY});
  dragMoved = 0;
});
MC.addEventListener('pointermove', e=>{
  if(!mpt.has(e.pointerId)) return;
  const prev = mpt.get(e.pointerId);
  if(mpt.size===1){
    MV.x -= (e.clientX-prev.x)/MV.s;
    MV.y -= (e.clientY-prev.y)/MV.s;
    dragMoved += Math.abs(e.clientX-prev.x)+Math.abs(e.clientY-prev.y);
  } else if(mpt.size===2){
    const pts = [...mpt.values()];
    const other = pts.find(p=>p!==prev);
    const d0 = hyp(prev.x-other.x, prev.y-other.y);
    const d1 = hyp(e.clientX-other.x, e.clientY-other.y);
    if(d0>0) MV.s = clamp(MV.s * d1/d0, 0.004, 0.2);
    dragMoved += 10;
  }
  mpt.set(e.pointerId, {x:e.clientX, y:e.clientY});
});
function mapUp(e){
  if(mpt.has(e.pointerId) && dragMoved < 8) mapPick(e.clientX, e.clientY);
  mpt.delete(e.pointerId);
}
MC.addEventListener('pointerup', mapUp);
MC.addEventListener('pointercancel', e=>mpt.delete(e.pointerId));
MC.addEventListener('wheel', e=>{
  e.preventDefault();
  MV.s = clamp(MV.s * (e.deltaY<0 ? 1.15 : 0.87), 0.004, 0.2);
}, {passive:false});
$('btnZoomIn').addEventListener('click', ()=>{ MV.s = clamp(MV.s*1.35, 0.004, 0.2); });
$('btnZoomOut').addEventListener('click',()=>{ MV.s = clamp(MV.s*0.74, 0.004, 0.2); });
$('btnMapClose').addEventListener('click', closeMap);
$('btnRoutes').addEventListener('click', ()=>{ MV.sel=null; renderRoutesSide(); });

function sysVisibleOnMap(sys){ return G.visited.has(sys.i) || hasR('scan2'); }
function mapPick(cx, cy){
  let best = null, bd = 26;
  for(const sys of GAL.systems){
    if(!sysVisibleOnMap(sys)) continue;
    const [sx, sy] = w2m(sys.x, sys.y);
    const d = hyp(sx-cx, sy-cy);
    if(d < bd){ bd = d; best = sys; }
  }
  if(best){ MV.sel = best; SND.blip(); renderSide(best); }
}
function renderSide(sys){
  const el = $('mapSide');
  if(!sys){ el.innerHTML = ''; return; }
  const visited = G.visited.has(sys.i);
  let h = `<div class="pTitle" style="font-size:13px">${sys.name}</div>
    <div class="sub">${sys.sun.cls}${visited?'':' — UNCHARTED'}</div>`;
  if(visited){
    for(const p of sys.planets){
      const col = G.colonies[p.id];
      const scanned = G.scanned.has(p.id);
      const nm = col ? col.name : (scanned ? sysPlanetName(sys,p) : 'UNSCANNED BODY');
      let mid = '';
      if(scanned){
        mid = `<div class="mid"><div class="midIn">`;
        for(const k in p.rates){
          mid += `<div><b style="color:${RESMETA[k].c}">${RESMETA[k].tag}</b> `
               + (col ? (p.rates[k]*col.b.extractor*colonyMult(col)).toFixed(1)+'/MIN'
                      : p.rates[k].toFixed(1)+'/MIN·LVL')
               + `</div>`;
        }
        mid += `<div class="stars" style="font-size:9px">${starRating(p.rich)}</div></div></div>`;
      }
      h += `<div class="row"><div class="lft" onclick="showPlanetInfo('${p.id}')" style="cursor:pointer">
        <span class="hueDot" style="background:${hsl(p.hue,p.sat,55)}"></span>${nm}
        <div class="cost">${scanned?PTYPES[p.type].label:'—'}${col?' · <span class="amb">COLONY</span>':''}</div>
        </div>${mid}<div class="btns vstack">`;
      if(MV.mode==='dst' && col && p.id!==MV.srcPid)
        h += `<button class="act" onclick="mapPickDst('p','${p.id}')">DELIVER HERE</button>`;
      if(MV.mode==='view'){
        const tracked = G.navTarget && G.navTarget.id===p.id;
        h += `<button class="act" ${tracked?'style="color:#ffb454;border-color:#ffb454"':''} onclick="navTrack('${p.id}')">${tracked?'TRACKING ◆':'TRACK'}</button>`;
        if(col){
          const wc = Math.ceil(warpCost(p.id));
          const can = hasR('warp1') && G.fuel>=wc && G.warpCd<=0;
          h += `<button class="act" ${can?'':'disabled'} onclick="tryWarp('${p.id}')">WARP · ${wc} FUEL</button>`;
          if(!hasR('warp1')) h += `<div class="cost">NEEDS WARP DRIVE</div>`;
        }
      }
      h += `</div></div>`;
    }
    if(sys.station){
      const stid = sys.station.id;
      h += `<div class="row"><div class="lft" style="color:#7fe9ff;cursor:pointer" onclick="showStationInfo('${stid}')">${sys.station.name}
        <div class="cost">TRADE STATION</div></div><div class="btns vstack">`;
      if(MV.mode==='dst')
        h += `<button class="act" onclick="mapPickDst('st','${stid}')">SELL HERE</button>`;
      else {
        const trackedS = G.navTarget && G.navTarget.id===stid;
        h += `<button class="act" ${trackedS?'style="color:#ffb454;border-color:#ffb454"':''} onclick="navTrack('${stid}')">${trackedS?'TRACKING ◆':'TRACK'}</button>`;
        const wc = Math.ceil(warpCost(stid));
        const can = hasR('warp1') && G.fuel>=wc && G.warpCd<=0;
        h += `<button class="act" ${can?'':'disabled'} onclick="tryWarp('${stid}')">WARP · ${wc} FUEL</button>`;
        if(!hasR('warp1')) h += `<div class="cost">NEEDS WARP DRIVE</div>`;
      }
      h += `</div></div>`;
    }
  } else {
    h += `<div class="sub" style="margin-top:8px">Fly there to chart this system.</div>`;
  }
  el.innerHTML = h;
}
function renderRoutesSide(){
  const el = $('mapSide');
  let h = `<div class="pTitle" style="font-size:13px">TRADE ROUTES</div>`;
  if(!G.routes.length) h += `<div class="sub" style="margin-top:8px">No routes yet. Research FREIGHT LOGISTICS, build a FREIGHT TERMINAL, then dock at that colony and press NEW ROUTE there.</div>`;
  G.routes.forEach((r,i)=>{
    const from = G.colonies[r.from] ? G.colonies[r.from].name : '?';
    let to = '?';
    if(r.to.k==='p') to = G.colonies[r.to.id] ? G.colonies[r.to.id].name : '?';
    else { const s = SIDX.get(r.to.id); to = s ? s.sys.station.name+' (SELL)' : '?'; }
    h += `<div class="row"><div class="lft">${from} ▸ ${to}</div>
      <div class="btns"><button class="act" onclick="mapDelRoute(${i})">SCRAP</button></div></div>`;
  });
  el.innerHTML = h;
}
window.mapPickDst = (k, id) => {
  if(addRoute(MV.srcPid, {k, id})){ MV.mode='view'; MV.srcPid=null; setHint(''); renderRoutesSide(); }
};
window.mapDelRoute = i => { delRoute(i); renderRoutesSide(); };
window.navTrack = id => {
  if(G.navTarget && G.navTarget.id===id){
    G.navTarget = null;
    toast('TRACKING CLEARED');
  } else {
    G.navTarget = { k: (''+id).indexOf('st')===0 ? 'st' : 'p', id };
    const t = targetInfo(id);
    SND.blip();
    toast('TRACKING '+(t?t.name:'TARGET')+' — FOLLOW THE AMBER CHEVRON', 'good');
  }
  renderSide(MV.sel);
};
window.tryWarp = tryWarp;

function mapKeyNav(dt){ // WASD/arrows pan · SPACE zooms in · SHIFT zooms out
  if(!mapVisible() || panelVisible() || MODE!=='play') return;
  const pan = 430 / MV.s * dt;
  if(keys.KeyW||keys.ArrowUp)    MV.y -= pan;
  if(keys.KeyS||keys.ArrowDown)  MV.y += pan;
  if(keys.KeyA||keys.ArrowLeft)  MV.x -= pan;
  if(keys.KeyD||keys.ArrowRight) MV.x += pan;
  if(keys.Space)                      MV.s = clamp(MV.s*(1+1.6*dt), 0.004, 0.2);
  if(keys.ShiftLeft||keys.ShiftRight) MV.s = clamp(MV.s/(1+1.6*dt), 0.004, 0.2);
}
function renderMap(t){
  MX.setTransform(DPR,0,0,DPR,0,0);
  MX.fillStyle = '#04050a'; MX.fillRect(0,0,W,H);
  /* chart rings */
  const [gx, gy] = w2m(0,0);
  MX.strokeStyle = 'rgba(233,220,194,.07)'; MX.lineWidth = 1;
  for(let r=WORLD_R; r>0; r-=WORLD_R/3){
    MX.beginPath(); MX.arc(gx, gy, r*MV.s, 0, TAU); MX.stroke();
  }
  MX.beginPath(); MX.moveTo(gx-14,gy); MX.lineTo(gx+14,gy);
  MX.moveTo(gx,gy-14); MX.lineTo(gx,gy+14); MX.stroke();
  /* routes */
  MX.lineWidth = 1.2;
  for(const r of G.routes){
    const {A,B} = routeEnds(r);
    const [ax,ay] = w2m(A.x,A.y), [bx,by] = w2m(B.x,B.y);
    MX.strokeStyle = 'rgba(255,180,84,.4)';
    MX.beginPath(); MX.moveTo(ax,ay); MX.lineTo(bx,by); MX.stroke();
    MX.fillStyle = '#ffb454';
    MX.beginPath(); MX.arc(lerp(ax,bx,r.t), lerp(ay,by,r.t), 3, 0, TAU); MX.fill();
  }
  /* systems */
  for(const sys of GAL.systems){
    const visited = G.visited.has(sys.i);
    if(!visited && !hasR('scan2')) continue;
    const [sx, sy] = w2m(sys.x, sys.y);
    // cull by the system's full extent, not just its star —
    // at high zoom a planet can be on screen while its sun is far outside the frame
    const cullM = 60 + sys.maxR*MV.s;
    if(sx<-cullM||sx>W+cullM||sy<-cullM||sy>H+cullM) continue;
    if(!visited){
      MX.fillStyle = 'rgba(233,220,194,.22)';
      MX.beginPath(); MX.arc(sx, sy, 2, 0, TAU); MX.fill();
      continue;
    }
    MX.fillStyle = hsl(sys.sun.h, sys.sun.s, 62);
    MX.beginPath(); MX.arc(sx, sy, 4.5, 0, TAU); MX.fill();
    const hasCol = sys.planets.some(p2=>G.colonies[p2.id]);
    if(hasCol){ // settled system: amber halo around the star
      MX.strokeStyle = 'rgba(255,180,84,.85)'; MX.lineWidth = 1.4;
      MX.beginPath(); MX.arc(sx, sy, 8.5, 0, TAU); MX.stroke();
    }
    MX.font = '10px ui-monospace, monospace'; MX.textAlign = 'center';
    MX.fillStyle = hasCol ? 'rgba(255,180,84,.9)' : 'rgba(138,129,114,.85)';
    MX.fillText(sys.name, sx, sy+18);
    /* whisper-faint orbital trails once individual planets resolve — same
       time-window logic as the minimap, just far more subdued */
    if(MV.s > 0.018){
      MX.lineWidth = 1;
      for(const p of sys.planets){
        const or = p.orbit*MV.s;
        if(or < 9) continue;
        const aNow = p.a0 + G.time*p.osp;
        const sweep = clamp(Math.abs(p.osp)*45, 0.1, 2.1) * Math.sign(p.osp||1);
        const c2 = G.colonies[p.id];
        const lk = !c2 && G.scanned.has(p.id) && !canColonize(p.type);
        const SEG = 6;
        for(let i2=0;i2<SEG;i2++){
          const f1 = (i2+1)/SEG;
          const a0 = aNow - sweep*(1-i2/SEG), a1 = aNow - sweep*(1-f1);
          const al = c2 ? 0.06+0.30*f1 : lk ? 0.03+0.15*f1 : 0.02+0.11*f1;
          MX.strokeStyle = c2 ? `rgba(255,180,84,${al})`
                          : lk ? `rgba(255,122,107,${al})` : `rgba(233,220,194,${al})`;
          MX.beginPath();
          MX.moveTo(sx+Math.cos(a0)*or, sy+Math.sin(a0)*or);
          MX.lineTo(sx+Math.cos(a1)*or, sy+Math.sin(a1)*or);
          MX.stroke();
        }
      }
    }
    for(const p of sys.planets){
      const pos = planetPos(sys, p, G.time);
      const [px, py] = w2m(pos.x, pos.y);
      const col = G.colonies[p.id];
      if(col){
        MX.save(); MX.translate(px,py); MX.rotate(Math.PI/4);
        MX.fillStyle = '#ffb454'; MX.fillRect(-3.4,-3.4,6.8,6.8);
        MX.restore();
        if(MV.s > 0.028){
          MX.fillStyle = 'rgba(255,180,84,.9)';
          MX.fillText(col.name, px, py-9);
        }
      } else if(MV.s > 0.02){
        MX.fillStyle = hsl(p.hue, p.sat, 48, .8);
        MX.beginPath(); MX.arc(px, py, 1.8, 0, TAU); MX.fill();
      }
    }
    if(sys.station){
      const sp = stationPos(sys, G.time);
      const [px, py] = w2m(sp.x, sp.y);
      MX.fillStyle = '#7fe9ff'; MX.fillRect(px-2.6, py-2.6, 5.2, 5.2);
    }
    if(MV.sel === sys){
      MX.strokeStyle = 'rgba(255,180,84,.8)'; MX.lineWidth = 1.4;
      MX.beginPath(); MX.arc(sx, sy, 13+2*Math.sin(t*4), 0, TAU); MX.stroke();
    }
  }
  /* ship */
  const [hx, hy] = w2m(G.x, G.y);
  MX.save(); MX.translate(hx, hy); MX.rotate(G.ang);
  MX.fillStyle = '#e9dcc2';
  MX.beginPath(); MX.moveTo(8,0); MX.lineTo(-6,5); MX.lineTo(-6,-5);
  MX.closePath(); MX.fill(); MX.restore();
  MX.strokeStyle = 'rgba(233,220,194,.5)';
  MX.beginPath(); MX.arc(hx, hy, 12, 0, TAU); MX.stroke();
}

function showPlanet(pid){

  const sizeCls = p.size<46?'SMALL':(p.size<72?'MEDIUM':'LARGE');
  let h = pHead(name, `<span class="hueDot" style="background:${hsl(p.hue,p.sat,55)}"></span>${PTYPES[p.type].label} · ${sizeCls} · ${colonySlots(p)} EXTRACTOR SLOTS`);

    <div class="row"><div class="lft">RICHNESS <span class="stars">${starRating(p.rich)}</span>${p.cRich?'<span class="tag" style="color:#ffd166;border-color:#ffd166">CRYSTAL VEINS</span>':''}</div></div>`;

    h += `<div class="row"><div class="lft"><b style="color:${RESMETA[k].c}">${RESMETA[k].n}</b></div>

  } else {

    h += bRow('STORAGE SILO', `${col.b.silo}/3 — +250 STORAGE CAP EACH`,
      col.b.silo<3 ? siloCost(col.b.silo) : null, `buildAt('${pid}','silo')`, col.b.silo<3?'BUILD':'MAX');
    h += bRow('HABITAT DOME', `${col.b.habitat}/3 — +25% OUTPUT EACH`,
      col.b.habitat<3 ? habCost(col.b.habitat) : null, `buildAt('${pid}','habitat')`, col.b.habitat<3?'BUILD':'MAX');
    h += bRow('FUEL DEPOT', col.b.depot?'ACTIVE — REFUELS SHIP FROM STORED GAS/ICE WHILE DOCKED':'REFUELS SHIP FROM STORED GAS/ICE',
      col.b.depot ? null : depotCost(), `buildAt('${pid}','depot')`, col.b.depot?'BUILT':'BUILD');
    const termReady = hasR('log1');

    let tSub, tCost = null, tLbl;
    if(!tl){ tSub = termReady ? 'ENABLES ONE OUTGOING TRADE ROUTE' : 'REQUIRES FREIGHT LOGISTICS RESEARCH';
             tCost = termReady ? termCost() : null; tLbl = 'BUILD'; }
    else if(tl===1){ tSub = hasR('logA') ? 'LEVEL 1 — 1 ROUTE · UPGRADE FOR 3 ROUTES'
                                          : 'LEVEL 1 — 1 ROUTE · ADVANCED LOGISTICS UNLOCKS UPGRADE';
                     tCost = hasR('logA') ? termUpCost() : null; tLbl = hasR('logA') ? 'UPGRADE' : 'BUILT'; }
    else { tSub = 'LEVEL 2 — UP TO 3 ROUTES'; tLbl = 'MAX'; }

      h += `<div class="secH">FREIGHT — ROUTES ${rts.length}/${cap2}</div>`;
      for(const r of rts){
        const gi = G.routes.indexOf(r);
        let dest = '?';
        if(r.to.k==='p') dest = G.colonies[r.to.id] ? G.colonies[r.to.id].name : '?';
        else { const s2 = SIDX.get(r.to.id); dest = s2 ? s2.sys.station.name+' (SELL)' : '?'; }
        const lv = r.lvl||1, st2 = FR_LVL[lv];
        let ub;
        if(lv>=3) ub = `<button class="act" disabled>LVL MAX</button>`;
        else if(!hasR('log2')) ub = `<button class="act" disabled>LVL ${lv}</button>`;
        else ub = `<button class="act" ${canPay(frUpCost(lv))?'':'disabled'} onclick="upgFreighter(${gi})">LVL ${lv+1} · ${costStr(frUpCost(lv))}</button>`;
        h += `<div class="row"><div class="lft">▸ ${dest}<div class="cost">FREIGHTER LVL ${lv} — ${st2.cap} CARGO · SPD ${st2.spdMin}–${st2.spdMax}${!hasR('log2')&&lv<3?' · HEAVY FREIGHTERS UNLOCKS UPGRADES':''}</div></div>
          <div class="btns">${ub}<button class="act" data-arm="SCRAP" onclick="scrapFreighter(${gi},this)">SCRAP</button></div></div>`;
      }
      const canNew = rts.length < cap2 && G.credits >= 200;
      h += `<div class="row"><div class="lft">NEW ROUTE<div class="cost">¤200 · PICK THE DESTINATION ON THE GALAXY MAP</div></div>
        <div class="btns"><button class="act" ${canNew?'':'disabled'} onclick="startRouteFrom('${pid}')">NEW ROUTE</button></div></div>`;
      if(rts.length >= cap2 && cap2===1)
        h += `<div class="sub">${hasR('logA')?'UPGRADE THE TERMINAL TO RUN UP TO 3 ROUTES.':'RESEARCH ADVANCED LOGISTICS TO RAISE THE ROUTE LIMIT.'}</div>`;
    }
    /* ship services */
    if(G.hull < maxHull()){
      h += `<div class="secH">SHIPYARD</div>
      <div class="row"><div class="lft">PATCH HULL<div class="cost">1 METAL = 3 HULL (HAVE ${Math.floor(G.cargo.metal)} ME)</div></div>
      <div class="btns"><button class="act" ${G.cargo.metal>=1?'':'disabled'} onclick="repairColony('${pid}')">REPAIR</button></div></div>`;
    }
  }
  openPanel(h);
  PANEL_PID = pid;
}

const HAND_CD = 6, HAND_YIELD = 0.2; // one dig = 12s worth of a level-1 extractor
function handExtract(pid){
  const ref = PIDX.get(pid); if(!ref) return;
  const col = G.colonies[pid]; if(!col) return;
  if((G.handCd||0) > 0){ SND.err(); return; }
  let space = Math.max(0, cargoCap() - cargoUsed());
  if(space <= 0.05){ SND.err(); toast('CARGO HOLD FULL', 'bad'); return; }
  const parts = [];
  for(const k in ref.p.rates){
    let g = ref.p.rates[k] * HAND_YIELD * colonyMult(col);
    g = Math.min(g, space); space -= g;
    if(g > 0.04){ G.cargo[k] += g; parts.push('+'+g.toFixed(1)+' '+RESMETA[k].tag); }
  }
  G.handCd = HAND_CD;
  SND.thunk(); toast('DUG BY HAND — '+parts.join(' '), 'good');
  showPlanet(pid);
}

  const mins = Math.floor(G.playSec/60);
  let h = pHead('COMMAND MENU', `SEED ${G.seed} · FLIGHT TIME ${Math.floor(mins/60)}H ${mins%60}M · ${Object.keys(G.colonies).length} COLONIES`);
  h += `<div class="row"><div class="lft">RESUME FLIGHT</div><div class="btns"><button class="act" onclick="closePanel()">RESUME</button></div></div>
  <div class="row"><div class="lft">SAVE GAME<div class="cost">ALSO AUTOSAVES EVERY 25S</div></div><div class="btns"><button class="act" onclick="menuSave()">SAVE</button></div></div>
  <div class="row"><div class="lft">SAVE ARCHIVE<div class="cost">NAMED SAVES · EXPORT / IMPORT</div></div><div class="btns"><button class="act" onclick="showSaves()">OPEN</button></div></div>
  ${matchMedia('(pointer:coarse)').matches ? '' : `<div class="row"><div class="lft">FULLSCREEN [F]</div><div class="btns"><button class="act" onclick="menuFullscreen(this)">${isFs()?'ON':'OFF'}</button></div></div>`}
  <div class="row"><div class="lft">SOUND</div><div class="btns"><button class="act" onclick="menuSound(this)">${SND.on?'ON':'OFF'}</button></div></div>
  <div class="row"><div class="lft">MANUAL</div><div class="btns"><button class="act" onclick="showHelp()">OPEN</button></div></div>
  <div class="row"><div class="lft">DEBUG CONSOLE<div class="cost">FREE RESOURCES · TESTING</div></div><div class="btns"><button class="act" onclick="showDebug()">OPEN</button></div></div>
  <div class="row"><div class="lft">EXIT TO TITLE<div class="cost">PROGRESS IS SAVED</div></div><div class="btns"><button class="act" onclick="quitToTitle()">EXIT</button></div></div>`;
  openPanel(h);
}
window.menuSave = async ()=>{ await saveGame(); SND.blip(); toast('EXPEDITION SAVED', 'good'); };
window.menuSound = btn => { SND.toggle(); btn.textContent = SND.on?'ON':'OFF'; $('btnSnd').textContent = 'SOUND: '+(SND.on?'ON':'OFF'); };
window.quitToTitle = async ()=>{
  await saveGame();
  closePanel(); closeMap();
  MODE = 'menu';
  $('hud').style.display = 'none';
  $('title').style.display = 'flex';
  $('btnCont').disabled = false;
};
let EJ_AMT = 1; // jettison quantity: 1, 10, or 'all'
window.setEjAmt = v => { EJ_AMT = v==='all' ? 'all' : +v; showEject(); };
function showEject(){
  let h = pHead('JETTISON CARGO', 'EJECTED GOODS ARE LOST TO THE VOID — MAKE ROOM IN A HURRY');
  h += holdLine();
  const amtBtn = v => {
    const on = EJ_AMT===v;
    return `<button class="act amt" ${on?'style="color:#ffb454;border-color:#ffb454"':''} onclick="setEjAmt('${v}')">${v==='all'?'ALL':v}</button>`;
  };
  h += `<div class="row"><div class="lft">AMOUNT<div class="cost">APPLIES TO EVERY EJECT BELOW</div></div>
    <div class="btns">${amtBtn(1)}${amtBtn(10)}${amtBtn('all')}</div></div>`;
  const lbl = EJ_AMT==='all' ? 'ALL' : EJ_AMT;
  const arg = EJ_AMT==='all' ? "'all'" : EJ_AMT;
  for(const k of RESKEYS){
    const have = G.cargo[k];
    h += `<div class="row"><div class="lft"><b style="color:${RESMETA[k].c}">${RESMETA[k].n}</b>
      <div class="cost">IN HOLD: ${Math.floor(have)}</div></div>
      <div class="btns"><button class="act tbtn" ${have>=0.5?'':'disabled'} onclick="ejectRes('${k}',${arg})">EJECT ${lbl}</button></div></div>`;
  }
  openPanel(h);
}
window.showEject = showEject;
window.ejectRes = (k, amt) => {
  const q = Math.min(amt==='all' ? G.cargo[k] : amt, G.cargo[k]);
  if(q<=0){ SND.err(); return; }
  G.cargo[k] -= q;
  spawnBurst({x:G.x, y:G.y}, 30);
  SND.thunk();
  toast('JETTISONED '+fmt(q)+' '+RESMETA[k].n);
  showEject(); updateHUD();
};
function showDebug(){
  let h = pHead('DEBUG CONSOLE', 'FREE RESOURCES & REPAIRS · FOR TESTING');
  h += `<div class="secH">SET RESOURCES</div>
    <div class="sub">Values apply instantly. Setting cargo above hold capacity is allowed here.</div>`;
  const rows = [['credits','CREDITS','#ffb454', Math.floor(G.credits)]]
    .concat(RESKEYS.map(k => [k, RESMETA[k].n, RESMETA[k].c, Math.floor(G.cargo[k])]));
  for(const [k, name, c, val] of rows){
    h += `<div class="row"><div class="lft"><b style="color:${c}">${name}</b></div>
      <div class="btns"><input class="tin" id="dbg_${k}" type="number" min="0" value="${val}" style="width:90px">
      <button class="act" onclick="dbgSet('${k}')">SET</button></div></div>`;
  }
  h += `<div class="secH">SHIP</div>
    <div class="row"><div class="lft">FUEL<div class="cost">${Math.floor(G.fuel)}/${FUELMAX}</div></div>
      <div class="btns"><button class="act" onclick="dbgFuel()">TOP UP</button></div></div>
    <div class="row"><div class="lft">HULL<div class="cost">${Math.floor(G.hull)}/${maxHull()}</div></div>
      <div class="btns"><button class="act" onclick="dbgHull()">REPAIR</button></div></div>`;
  openPanel(h);
}
window.showDebug = showDebug;
window.dbgSet = k => {
  const el = document.getElementById('dbg_'+k);
  const v = parseFloat(el && el.value);
  if(!isFinite(v) || v < 0){ SND.err(); toast('ENTER A NON-NEGATIVE NUMBER', 'bad'); return; }
  if(k==='credits') G.credits = v; else G.cargo[k] = v;
  SND.coin(); toast('DEBUG — '+(k==='credits'?'CREDITS':RESMETA[k].n)+' SET TO '+fmt(v), 'good');
  showDebug(); updateHUD();
};
window.dbgFuel = () => { G.fuel = FUELMAX; SND.blip(); toast('DEBUG — TANK FILLED', 'good'); showDebug(); updateHUD(); };
window.dbgHull = () => { G.hull = maxHull(); SND.blip(); toast('DEBUG — HULL RESTORED', 'good'); showDebug(); updateHUD(); };
function showHelp(){
  const h = pHead('FIELD MANUAL', 'ASTRONOMICS OPERATIONS GUIDE') + `
  <div class="secH">FLIGHT</div>
  <div class="sub">W thrusts forward, A and D turn, S brakes — SPACE or SHIFT boosts (burns extra fuel). Arrow keys work the same way. On touch, the left stick points the ship where you want to go. E / DOCK interacts with the nearest planet or station. M opens the galaxy map, R the research lab, TAB the menu, Q the cargo jettison, F fullscreen. The faint cyan chevron beside your ship points to the nearest trade station; press TRACK on any planet in the galaxy map to swap it for an amber pointer to that world. Flying near a planet scans it automatically. Careful near stars — heat shreds hull.</div>
  <div class="secH">THE LOOP</div>
  <div class="sub">1 · Scan worlds to see their yield. 2 · COLONIZE (costs metal + organics + credits from your hold — haul supplies with you). 3 · Build EXTRACTORS; resources pile up in colony storage. 4 · Dock and COLLECT into your hold. 5 · Spend metal to build, organics to grow, crystal to research, and sell surplus at cyan TRADE STATIONS for credits.</div>
  <div class="secH">RESOURCES</div>
  <div class="sub"><b style="color:#c3ccd6">METAL</b> builds everything and patches hull. <b style="color:#8fe08f">ORGANICS</b> found colonies and habitats. <b style="color:#ffd166">CRYSTAL</b> fuels research — mine rich worlds, crack anomalies. <b style="color:#c58bff">GAS</b> and <b style="color:#8fd8ff">ICE</b> convert to ship fuel at a colony FUEL DEPOT, and sell well. Trade stations deal BOTH WAYS — short on metal or organics? Sell what you have, buy what you need (at a markup, so shop where prices run ▼ LOW).</div>
  <div class="secH">NETWORK</div>
  <div class="sub">Research FREIGHT LOGISTICS, build a FREIGHT TERMINAL, then dock at that colony and press NEW ROUTE to pick a destination on the map: colony ▸ colony moves goods automatically; colony ▸ station sells them for hands-free income. ADVANCED LOGISTICS lets you upgrade a terminal to run THREE routes, and HEAVY FREIGHTERS lets you upgrade each freighter to level 3 from the colony panel. On the galaxy map, WASD pans the view and SPACE / SHIFT zoom in and out. While docked at a colony, SPACE also works the ground crew's dig. Freighters fly faster the lighter they are, wait at the dock when storage is empty, and never overfill a destination — anything that does not fit rides back and goes out with the next load. Research WARP DRIVE to jump to any colony from the map.</div>
  <div class="secH">OUT THERE</div>
  <div class="sub">Amber diamonds are anomalies — fly into them. Milestones (top of screen) pay out credits and crystal. If your hull fails you are towed to safety, minus 10% credits. The galaxy is yours to wire together, commander.</div>`;
  openPanel(h);

window.showHelp = showHelp;

/* ---------------- NAMED SAVES + EXPORT/IMPORT ---------------- */
const SLOTS_KEY = 'astronomics_slots';
async function getSlots(){ return (await stGet(SLOTS_KEY)) || {}; }
async function setSlots(o){ await stSet(SLOTS_KEY, o); }
const esc = s => String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function validSave(o){
  return o && typeof o==='object' && typeof o.seed==='number' && o.cargo && Array.isArray(o.visited);
}
function saveLabel(d){
  const dt = new Date(d.at||0);
  const cols = d.data && d.data.colonies ? Object.keys(d.data.colonies).length : 0;
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} `
       + `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`
       + ` · SEED ${d.data.seed} · ${cols} COLONIES`;
}
async function showSaves(){
  const slots = await getSlots();
  let h = pHead('SAVE ARCHIVE', 'NAMED SAVES · EXPORT / IMPORT · AUTOSAVE RUNS SEPARATELY');
  if(MODE==='play'){
    h += `<div class="secH">SAVE CURRENT EXPEDITION</div>
      <div class="row"><div class="lft" style="flex:1;padding-right:10px">
        <input class="tin" id="svName" maxlength="24" placeholder="SAVE NAME" value="${esc(G.saveName||'')}"></div>
      <div class="btns"><button class="act" onclick="svSaveAs()">SAVE</button>
      <button class="act" onclick="svExport('')">EXPORT</button></div></div>
      <div class="sub">Saving with an existing name overwrites it.</div>`;
  }
  const ids = Object.keys(slots).sort((a,b)=>(slots[b].at||0)-(slots[a].at||0));
  h += `<div class="secH">SAVED EXPEDITIONS — ${ids.length}</div>`;
  if(!ids.length) h += `<div class="sub">Nothing archived yet.</div>`;
  for(const id of ids){
    const d = slots[id];
    h += `<div class="row"><div class="lft"><b class="amb">${esc(d.name)}</b>
      <div class="cost">${saveLabel(d)}</div></div>
      <div class="btns">
      <button class="act" data-arm="LOAD" onclick="svLoad('${id}',this)">LOAD</button>
      <button class="act" onclick="svExport('${id}')">EXPORT</button>
      <button class="act" data-arm="DEL" onclick="svDelete('${id}',this)">DEL</button>
      </div></div>`;
  }
  h += `<div class="secH">EXPORT OUTPUT</div>
    <textarea class="tin" id="expOut" readonly placeholder="Press EXPORT on a save — the code appears here."></textarea>
    <div class="row"><div class="lft"></div><div class="btns">
    <button class="act" onclick="svCopy()">COPY CODE</button>
    <button class="act" onclick="svDownload()">DOWNLOAD .JSON</button></div></div>
    <div class="secH">IMPORT</div>
    <textarea class="tin" id="impIn" placeholder="Paste a save code here…"></textarea>
    <div class="row"><div class="lft"><input type="file" id="impFile" accept=".json,application/json" class="tin" style="padding:4px"></div>
    <div class="btns"><button class="act" onclick="svImport()">IMPORT</button></div></div>`;
  openPanel(h);
  const f = $('impFile');
  f.addEventListener('change', ()=>{
    const file = f.files && f.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = ()=>{ $('impIn').value = r.result; svImport(); };
    r.readAsText(file);
  });
}
window.showSaves = showSaves;
function armTwice(btn){ // first tap arms, second tap within 3s confirms
  if(btn.dataset.armed){ return true; }
  btn.dataset.armed = '1'; const orig = btn.dataset.arm || btn.textContent;
  btn.textContent = 'SURE?';
  setTimeout(()=>{ if(btn.isConnected){ delete btn.dataset.armed; btn.textContent = orig; } }, 3000);
  return false;
}
window.svSaveAs = async ()=>{
  const name = ($('svName').value.trim() || 'EXPEDITION').toUpperCase().slice(0,24);
  const slots = await getSlots();
  let id = Object.keys(slots).find(k=>slots[k].name===name);
  if(!id) id = 's'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);
  slots[id] = { name, at: Date.now(), data: serialize() };
  await setSlots(slots);
  G.saveName = name;
  SND.blip(); toast('ARCHIVED — '+name, 'good');
  showSaves();
};
window.svLoad = async (id, btn)=>{
  if(MODE==='play' && !armTwice(btn)) return; // confirm: overwrites current progress
  const slots = await getSlots();
  const d = slots[id]; if(!d || !validSave(d.data)){ SND.err(); toast('SAVE UNREADABLE','bad'); return; }
  applySave(JSON.parse(JSON.stringify(d.data)));
  G.saveName = d.name;
  closePanel();
  if(MODE==='menu') startGame();
  else { SND.warp(); toast('EXPEDITION RESTORED — '+d.name, 'good'); }
};
window.svDelete = async (id, btn)=>{
  if(!armTwice(btn)) return;
  const slots = await getSlots();
  delete slots[id];
  await setSlots(slots);
  toast('SAVE DELETED');
  showSaves();
};
let EXP_NAME = 'ASTRONOMICS';
window.svExport = async id=>{
  let name, data;
  if(id===''){ name = (G.saveName||'CURRENT'); data = serialize(); }
  else {
    const slots = await getSlots(); const d = slots[id];
    if(!d){ return; }
    name = d.name; data = d.data;
  }
  EXP_NAME = name;
  $('expOut').value = JSON.stringify({ astronomics:1, name, at:Date.now(), save:data });
  SND.blip(); toast('EXPORT READY — COPY OR DOWNLOAD IT');
};
window.svCopy = ()=>{
  const el = $('expOut');
  if(!el.value){ SND.err(); toast('EXPORT SOMETHING FIRST','bad'); return; }
  el.focus(); el.select();
  const done = ()=>{ SND.blip(); toast('COPIED TO CLIPBOARD','good'); };
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(el.value).then(done, ()=>{ try{document.execCommand('copy');done();}catch(e){} });
  else { try{ document.execCommand('copy'); done(); }catch(e){ toast('SELECT + COPY MANUALLY','bad'); } }
};
window.svDownload = ()=>{
  const v = $('expOut').value;
  if(!v){ SND.err(); toast('EXPORT SOMETHING FIRST','bad'); return; }
  try{
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([v], {type:'application/json'}));
    a.download = 'Astronomics-'+EXP_NAME.replace(/[^A-Z0-9_-]/gi,'_')+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
  }catch(e){ SND.err(); toast('DOWNLOAD BLOCKED — USE COPY CODE','bad'); }
};
window.svImport = async ()=>{
  const raw = $('impIn').value.trim();
  if(!raw){ SND.err(); toast('PASTE A SAVE CODE OR PICK A FILE','bad'); return; }
  let o;
  try{ o = JSON.parse(raw); }catch(e){ SND.err(); toast('NOT VALID SAVE DATA','bad'); return; }
  const data = validSave(o) ? o : (o && validSave(o.save) ? o.save : null);
  if(!data){ SND.err(); toast('NOT VALID SAVE DATA','bad'); return; }
  const name = ((o.name||'IMPORTED')+'').toUpperCase().slice(0,24);
  const slots = await getSlots();
  let id = Object.keys(slots).find(k=>slots[k].name===name);
  if(!id) id = 's'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);
  slots[id] = { name, at: Date.now(), data };
  await setSlots(slots);
  SND.blip(); toast('IMPORTED — '+name+' ADDED TO ARCHIVE','good');
  showSaves();
};

/* ---------------- HUD ---------------- */
let hudTimer = 0;
function updateHUD(){
  $('fuelF').style.width = 'calc('+(clamp(G.fuel/FUELMAX,0,1)*100).toFixed(1)+'% - 2px)';
  const hf = $('hullF');
  hf.style.width = 'calc('+(clamp(G.hull/maxHull(),0,1)*100).toFixed(1)+'% - 2px)';
  hf.style.background = G.hull < maxHull()*0.3 ? '#ff7a6b' : '#9adf9a';
  let ch = `<span class="chip"><b class="amb">¤</b> ${fmt(G.credits)}</span>`;
  for(const k of RESKEYS)
    ch += `<span class="chip"><b style="color:${RESMETA[k].c}">${RESMETA[k].tag}</b> ${Math.floor(G.cargo[k])}</span>`;
  $('chips').innerHTML = ch;
  $('cargoTxt').textContent = cargoUsed()+'/'+cargoCap();
  $('cargoF').style.width = 'calc('+(clamp(cargoUsed()/cargoCap(),0,1)*100).toFixed(1)+'% - 2px)';
  $('objective').innerHTML = '<span>OBJECTIVE ▸ </span>'+currentObjective();
  /* prompt */
  let pr = '';
  const near = G.nearTarget;
  if(near){
    pr = '[E] DOCK — '+near.name;
    const col = near.kind==='planet' && G.colonies[near.id];
    if(col && col.b.depot && G.fuel < FUELMAX-0.5) pr += '  ·  REFUELING';
  } else if(G.fuel < 15){
    pr = (Math.floor(performance.now()/400)%2) ? 'LOW FUEL — FIND GAS, ICE OR A STATION' : '';
  }
  $('prompt').textContent = pr;
  $('abInteract').style.opacity = near ? 1 : .35;
  /* live cooldown on the manual-extraction button if a colony panel is open */
  const hb = document.getElementById('handBtn');
  if(hb){
    const cd = G.handCd||0;
    hb.disabled = cd > 0;
    hb.textContent = cd > 0 ? 'DIG · '+Math.ceil(cd)+'S' : 'DIG';
  }
}

/* ---------------- MAIN LOOP + BOOT ---------------- */
let last = 0;
function frame(ts){
  const t = ts/1000;
  let dt = Math.min(0.05, t - last || 0.016);
  last = t;
  if(MODE==='play') update(dt);
  draw(t);
  if(MODE==='play'){
    if(mapVisible()){ mapKeyNav(dt); renderMap(t); }
    else drawMinimap(t);
    hudTimer -= dt;
    if(hudTimer<=0){ hudTimer = 0.12; updateHUD(); }
  }
  requestAnimationFrame(frame);
}

function startGame(){
  MODE = 'play';
  $('title').style.display = 'none';
  $('hud').style.display = 'block';
  cam.x = G.x; cam.y = G.y;
  resizeAll();
  SND.ensure(); SND.ambient();
  toast('SYSTEMS ONLINE — WELCOME TO '+GAL.systems[0].name+', COMMANDER', 'good');
  toast('FLY CLOSE TO A PLANET TO SCAN IT');
  updateHUD();
}
$('btnNew').addEventListener('click', ()=>{
  SND.ensure();
  const sv = $('seedIn').value.trim();
  const seed = sv ? seedFromString(sv.toUpperCase()) : (Math.random()*4294967295)>>>0;
  newState(seed);
  startGame();
  saveGame();
});
$('btnCont').addEventListener('click', async ()=>{
  SND.ensure();
  const o = await stGet('astronomics_save');
  if(!o){ toast('NO SAVE FOUND','bad'); return; }
  applySave(o);
  startGame();
});
$('btnHow').addEventListener('click', ()=>{ if(!G){ newStateForHelp(); } showHelp(); });
$('btnSaves').addEventListener('click', showSaves);
function newStateForHelp(){ /* manual can open without a game */ }
$('btnSnd').addEventListener('click', function(){ SND.ensure(); SND.toggle(); this.textContent = 'SOUND: '+(SND.on?'ON':'OFF'); });
$('btnMap').addEventListener('click', ()=>{ if(!panelVisible()) openMap(); });
$('btnRes').addEventListener('click', ()=>{ if(!mapVisible()) showResearch(); });
function fsSupported(){
  const el = document.documentElement;
  return !!(el.requestFullscreen || el.webkitRequestFullscreen);
}
function isFs(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
window.isFs = isFs;
function toggleFs(){
  if(!fsSupported()){
    SND.err();
    toast('FULLSCREEN NOT SUPPORTED IN THIS BROWSER', 'bad');
    return;
  }
  try{
    if(isFs()){
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
      const el = document.documentElement;
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    }
  }catch(e){ SND.err(); toast('FULLSCREEN BLOCKED BY THE BROWSER', 'bad'); }
}
function fsLabelSync(){
  const b = $('btnFull');
  if(b) b.textContent = 'FULLSCREEN: '+(isFs() ? 'ON' : 'OFF');
}
document.addEventListener('fullscreenchange', ()=>{ fsLabelSync(); resizeAll(); });
document.addEventListener('webkitfullscreenchange', ()=>{ fsLabelSync(); resizeAll(); });
$('btnFull').addEventListener('click', toggleFs);
window.menuFullscreen = btn => { toggleFs(); setTimeout(()=>{ if(btn.isConnected) btn.textContent = isFs()?'ON':'OFF'; }, 150); };
$('btnMenu').addEventListener('click', showMenu);
$('btnEject').addEventListener('click', ()=>{ if(MODE==='play' && !mapVisible() && !panelVisible()) showEject(); });
addEventListener('keydown', e=>{ // ESC closes manual on the title screen
  if(MODE==='menu' && (e.code==='Escape'||e.code==='Tab') && panelVisible()){ e.preventDefault(); closePanel(); }
});
addEventListener('contextmenu', e=>e.preventDefault());

(async function boot(){
  resizeAll();
  GAL = genGalaxy(1337); indexGalaxy(); // demo backdrop for the title
  const pref = await stGet('astronomics_snd');
  if(pref===false){ SND.on = false; $('btnSnd').textContent = 'SOUND: OFF'; }
  const save = await stGet('astronomics_save');
  if(save) $('btnCont').disabled = false;
  requestAnimationFrame(frame);
})();
</script>
